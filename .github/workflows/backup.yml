name: Respaldo semanal de la base de datos

# Corre automáticamente cada lunes a las 8am UTC, y también se puede
# lanzar a mano desde la pestaña "Actions" de GitHub cuando quieras.
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Instalar cliente de Postgres (versión 17, igual que Supabase)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl ca-certificates gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17

      - name: Crear el respaldo
        run: |
          mkdir -p backups
          /usr/lib/postgresql/17/bin/pg_dump "${{ secrets.DATABASE_URL }}" --no-owner --no-privileges > backups/backup-$(date +%Y-%m-%d).sql

      - name: Borrar respaldos de más de 90 días
        run: find backups/ -name "*.sql" -mtime +90 -delete || true

      - name: Subir el respaldo al repositorio
        run: |
          git config user.name "backup-bot"
          git config user.email "backup-bot@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "Respaldo automático $(date +%Y-%m-%d)"
          git push
