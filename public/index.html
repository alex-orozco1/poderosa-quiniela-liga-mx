    else if(adminSubTab==="dueno") renderAdminOwner(body);
  }

  // "Adicionales": catch-all tab for extra scoring features that don't fit the core
  // flow (jornadas/resultados) — top-scorer bet, unpaid-participant penalty, and
  // whatever similar features get added later. Keeps Ajustes from getting cluttered.
  function renderAdminAdicionales(body){
    const migrated = ensureCustomBets();
    if(!meta.paymentPenalty) meta.paymentPenalty = { enabled: false, startsAtRound: null, pointsPerRound: 1 };
    const penalty = meta.paymentPenalty;
    const draft = renderAdminAdicionales._draft;

    function betRowHtml(bet){
      const scopeLabel = bet.scope === "temporada" ? "De toda la temporada" : "Se pregunta cada jornada";
      return `
        <div class="history-item">
          <div>
            <strong>${esc(bet.label)}</strong> <span class="muted">· ${scopeLabel} · +${bet.points} pts${bet.scope==="temporada" && bet.closesAtRound ? ` · cierra en Jornada ${bet.closesAtRound}` : ""}</span>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-ghost btn-sm" data-edit-bet="${bet.id}">Editar</button>
            <button class="btn btn-danger btn-sm" data-del-bet="${bet.id}">Eliminar</button>
          </div>
        </div>
      `;
    }

    function formHtml(){
      const editing = draft && draft.id;
      const scope = draft ? draft.scope : "temporada";
      return `
        <div class="card">
          <div class="eyebrow">${editing ? "Editar apuesta" : "Nueva apuesta"}</div>
          <div class="field"><label>Nombre</label><input type="text" id="qz-cb-label" value="${esc(draft ? draft.label : '')}" placeholder="Ej. Campeón de goleo, Quién anota hoy..."></div>
          <div class="field">
            <label>¿Cuándo se contesta?</label>
            <select id="qz-cb-scope">
              <option value="temporada" ${scope==="temporada"?"selected":""}>Una sola vez, para toda la temporada</option>
              <option value="jornada" ${scope==="jornada"?"selected":""}>Se vuelve a preguntar en cada jornada</option>
            </select>
          </div>
          <div class="row2">
            <div class="field"><label>Puntos si le atina</label><input type="number" id="qz-cb-points" value="${draft ? draft.points : 3}"></div>
            <div class="field" id="qz-cb-closes-wrap" style="${scope==='jornada' ? 'display:none;' : ''}"><label>Se cierra antes de que inicie la jornada</label><input type="number" id="qz-cb-closes" value="${draft && draft.closesAtRound ? draft.closesAtRound : ''}" placeholder="Opcional"></div>
          </div>
          <p class="muted" style="margin-top:-8px;">Los participantes escriben su respuesta libremente. Tú decides a mano quién le atinó — todavía no validamos esto en automático.</p>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-primary" id="qz-cb-save-bet">${editing ? "Guardar cambios" : "Crear apuesta"}</button>
            <button class="btn btn-ghost" id="qz-cb-cancel-bet">Cancelar</button>
          </div>
        </div>
      `;
    }

    body.innerHTML = `
      <div class="card">
        <div class="eyebrow">Apuestas personalizadas</div>
        <p class="muted" style="margin-top:-4px;">Arma las tuyas: goleador, campeón de goleo, quién anota esta jornada, lo que se les ocurra. Cada una suma puntos si el participante le atina, y tú validas a mano quién ganó (porque cada quien escribe distinto).</p>
        ${(meta.customBets && meta.customBets.length) ? meta.customBets.map(betRowHtml).join("") : `<p class="muted">Todavía no has creado ninguna.</p>`}
        ${!draft ? `<button class="btn btn-gold" id="qz-cb-new" style="margin-top:10px;">+ Nueva apuesta</button>` : ``}
      </div>
      ${draft ? formHtml() : ``}
      ${(() => {
        const temporadaBets = (meta.customBets || []).filter(b => b.scope === "temporada");
        if(!temporadaBets.length) return "";
        return `
          <div class="card" style="padding:8px 12px;overflow-x:auto;">
            <div class="eyebrow" style="padding:10px 12px 0;">Validar apuestas personalizadas</div>
            <p class="muted" style="padding:0 12px;margin-top:-4px;">Desliza hacia los lados para ver todas — el nombre se queda fijo.</p>
            <table>
              <thead>
                <tr>
                  <th class="qz-sticky-col">Participante</th>
                  ${temporadaBets.map(bet => `<th colspan="2" style="text-align:center;">${esc(bet.label)}</th>`).join("")}
                </tr>
                <tr>
                  <th class="qz-sticky-col"></th>
                  ${temporadaBets.map(() => `<th style="text-align:center;">Apostó a</th><th style="text-align:center;">¿Atinó?</th>`).join("")}
                </tr>
              </thead>
              <tbody>
                ${meta.participants.map(p => `
                  <tr>
                    <td class="qz-sticky-col">${esc(p.name)}</td>
                    ${temporadaBets.map(bet => {
                      const ans = p.customBetAnswers && p.customBetAnswers[bet.id];
                      return `
                        <td style="text-align:center;">${ans && ans.guess ? esc(ans.guess) : '<span class="muted">—</span>'}</td>
                        <td style="text-align:center;"><input type="checkbox" data-role="cb-correct" data-pid="${p.id}" data-bet="${bet.id}" ${ans && ans.correct ? "checked" : ""} ${ans && ans.guess ? "" : "disabled"}></td>
                      `;
                    }).join("")}
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      })()}
      ${(meta.customBets || []).some(b => b.scope === "jornada") ? `
        <div class="card">
          <p class="muted">Las apuestas "de cada jornada" se validan jornada por jornada, en <strong>Admin → Resultados</strong>, junto con el resultado de esa jornada.</p>
        </div>
      ` : ``}
      <div class="card">
        <div class="eyebrow">Penalización por no pagar</div>
        <p class="muted" style="margin-top:-4px;">A quien ya está marcado como "Pagó" en Participantes nunca se le resta nada. A quien no ha pagado, se le empiezan a restar puntos a partir de la jornada que elijas, uno por cada jornada que pase mientras siga sin pagar — se detiene en cuanto lo marques como pagado.</p>
        <div class="field">
          <label><input type="checkbox" id="qz-penalty-enabled" ${penalty.enabled ? "checked" : ""}> Activar penalización</label>
        </div>
        <div class="row2">
          <div class="field"><label>A partir de la jornada</label><input type="number" id="qz-penalty-round" value="${penalty.startsAtRound ? penalty.startsAtRound : ''}" placeholder="Ej. 5"></div>
          <div class="field"><label>Puntos a restar por jornada</label><input type="number" id="qz-penalty-points" value="${penalty.pointsPerRound != null ? penalty.pointsPerRound : 1}"></div>
        </div>
        <button class="btn btn-primary" id="qz-save-penalty">Guardar</button>
      </div>
    `;

    if(migrated) setMeta(meta);

    const newBtn = document.getElementById("qz-cb-new");
    if(newBtn) newBtn.addEventListener("click", () => { renderAdminAdicionales._draft = {}; renderAdminAdicionales(body); });

    const scopeSelect = document.getElementById("qz-cb-scope");
    if(scopeSelect){
      scopeSelect.addEventListener("change", () => {
        document.getElementById("qz-cb-closes-wrap").style.display = scopeSelect.value === "jornada" ? "none" : "";
      });
    }
    const cancelBtn = document.getElementById("qz-cb-cancel-bet");
    if(cancelBtn) cancelBtn.addEventListener("click", () => { renderAdminAdicionales._draft = null; renderAdminAdicionales(body); });

    const saveBetBtn = document.getElementById("qz-cb-save-bet");
    if(saveBetBtn){
      saveBetBtn.addEventListener("click", async () => {
        const label = document.getElementById("qz-cb-label").value.trim();
        if(!label){ toast("Ponle un nombre"); return; }
        const scope = document.getElementById("qz-cb-scope").value;
        const points = Number(document.getElementById("qz-cb-points").value) || 0;
        const closesRaw = document.getElementById("qz-cb-closes").value.trim();
        const closesAtRound = (scope === "temporada" && closesRaw) ? Number(closesRaw) : null;
        if(!meta.customBets) meta.customBets = [];
        if(draft.id){
          const bet = meta.customBets.find(b => b.id === draft.id);
          if(bet){ bet.label = label; bet.scope = scope; bet.points = points; bet.closesAtRound = closesAtRound; }
        } else {
          meta.customBets.push({ id: uid("cb"), label, scope, points, closesAtRound });
        }
        const ok = await setMeta(meta);
        if(ok){
          toast("Guardado ✅");
          renderAdminAdicionales._draft = null;
          renderAdminAdicionales(body);
        } else {
          toast("No se pudo guardar, intenta de nuevo");
        }
      });
    }

    body.querySelectorAll("[data-edit-bet]").forEach(btn => {
      btn.addEventListener("click", () => {
        const bet = meta.customBets.find(b => b.id === btn.dataset.editBet);
        renderAdminAdicionales._draft = { ...bet };
        renderAdminAdicionales(body);
      });
    });
    body.querySelectorAll("[data-del-bet]").forEach(btn => {
      btn.addEventListener("click", async () => {
        if(!confirm("¿Eliminar esta apuesta? Se pierden las respuestas de todos.")) return;
        meta.customBets = meta.customBets.filter(b => b.id !== btn.dataset.delBet);
        meta.participants.forEach(p => { if(p.customBetAnswers) delete p.customBetAnswers[btn.dataset.delBet]; });
        meta.rounds.forEach(r => { if(r.customBetResults) delete r.customBetResults[btn.dataset.delBet]; });
        await setMeta(meta);
        renderAdminAdicionales(body);
      });
    });
    body.querySelectorAll("[data-role=cb-correct]").forEach(checkbox => {
      checkbox.addEventListener("change", async () => {
        const pid = checkbox.dataset.pid;
        const betId = checkbox.dataset.bet;
        const p = meta.participants.find(x => x.id === pid);
        if(!p || !p.customBetAnswers || !p.customBetAnswers[betId]) return;
        p.customBetAnswers[betId].correct = checkbox.checked;
        const ok = await setMeta(meta);
        if(ok) toast(checkbox.checked ? `${p.name} ✅` : `Se quitó el punto de ${p.name}`);
        else { checkbox.checked = !checkbox.checked; toast("No se pudo guardar"); }
      });
    });

    document.getElementById("qz-save-penalty").addEventListener("click", async () => {
      penalty.enabled = document.getElementById("qz-penalty-enabled").checked;
      const roundRaw = document.getElementById("qz-penalty-round").value.trim();
      penalty.startsAtRound = roundRaw === "" ? null : Number(roundRaw);
      const ptsRaw = document.getElementById("qz-penalty-points").value.trim();
      penalty.pointsPerRound = ptsRaw === "" ? 1 : Number(ptsRaw);
      const ok = await setMeta(meta);
      toast(ok ? "Penalización guardada ✅" : "No se pudo guardar");
    });
  }

  // "Participación": who has/hasn't submitted picks for open rounds — status only, never reveals picks
  function spectatorLinkCardHtml(){
    const link = `${window.location.origin}${ROUTE === "root" ? "/" : "/q/" + esc(SLUG)}?ver=1`;
    return `
      <div class="card">
        <div class="eyebrow">Link de "solo ver"</div>
        <p class="muted">Para familiares o curiosos que quieren checar la tabla sin ser parte de la quiniela — no necesitan elegir nombre ni PIN, solo ven la tabla de posiciones, en modo lectura.</p>
        <button class="btn btn-gold" id="qz-spectator-copy" data-link="${link}">Copiar link</button>
      </div>
    `;
  }
  function wireSpectatorLinkCard(body){
    const btn = body.querySelector("#qz-spectator-copy");
    if(!btn) return;
    btn.addEventListener("click", async (e) => {
      const val = e.currentTarget.dataset.link;
      try{
        await navigator.clipboard.writeText(val);
        toast("Link copiado ✅");
      }catch(e){
        toast("No se pudo copiar, intenta de nuevo");
      }
    });
  }

  async function renderAdminParticipacion(body){
    const openRounds = meta.rounds.filter(r => classifyRound(r) === "porjugar").slice().sort((a,b)=>a.number-b.number);
    if(!openRounds.length){
      body.innerHTML = `<div class="card empty"><div class="display">No hay jornadas abiertas</div><p class="muted">No hay ninguna jornada aceptando picks en este momento.</p></div>${spectatorLinkCardHtml()}`;
      wireSpectatorLinkCard(body);
      return;
    }
    body.innerHTML = `<div class="card"><p class="muted">Cargando estatus de participación…</p></div>`;
    await ensureAllPicksLoaded();

    body.innerHTML = openRounds.map(round => {
      const total = round.matches.length;
      const rows = meta.participants.map(p => {
        const picks = (allPicksCache[p.id] || {})[round.id] || {};
        const count = round.matches.filter(m => picks[m.id]).length;
        let status;
        if(count === 0) status = {label:"Sin contestar", cls:"unpaid", icon:"❌"};
        else if(count < total) status = {label:`Incompleto (${count}/${total})`, cls:"unpaid", icon:"⚠️"};
        else status = {label:"Completo", cls:"paid", icon:"✅"};
        return { name: p.name, ...status, count };
      }).sort((a,b) => a.count - b.count || a.name.localeCompare(b.name));
      const missingNames = rows.filter(r => r.count < total).map(r => r.name);
      return `
        <div class="card">
          <div class="eyebrow" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
            <span>Jornada ${round.number} · ${total} partidos</span>
            <div style="display:flex;gap:6px;">
              ${missingNames.length ? `<button class="btn btn-ghost btn-sm" data-copy="${round.id}">📋 Copiar</button>` : ``}
              ${missingNames.length ? `<button class="btn btn-gold btn-sm" data-whatsapp="${round.id}">🟢 Abrir en WhatsApp</button>` : ``}
            </div>
          </div>
          <p class="muted" style="margin-top:-4px;">No se muestran los picks de nadie, solo si ya contestaron.</p>
          <table>
            <thead><tr><th>Participante</th><th>Estatus</th></tr></thead>
            <tbody>
              ${rows.map(r => `<tr><td>${esc(r.name)}</td><td><span class="badge ${r.cls}">${r.icon} ${r.label}</span></td></tr>`).join("")}
            </tbody>
          </table>
        </div>
      `;
    }).join("") + spectatorLinkCardHtml();

    function reminderText(round, missing){
      const bullets = missing.map(n => `• ${n}`).join("\n");
      return `⏰ Faltan por contestar la Jornada ${round.number}:\n${bullets}\n\n¡No se les olvide antes del cierre!`;
    }

    function missingFor(round){
      const total = round.matches.length;
      return meta.participants.filter(p => {
        const picks = (allPicksCache[p.id] || {})[round.id] || {};
        const count = round.matches.filter(m => picks[m.id]).length;
        return count < total;
      }).map(p => p.name);
    }

    body.querySelectorAll("[data-copy]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const round = openRounds.find(r => r.id === btn.dataset.copy);
        const text = reminderText(round, missingFor(round));
        try{
          await navigator.clipboard.writeText(text);
          toast("Recordatorio copiado ✅ pégalo donde quieras");
        }catch(e){
          toast("No se pudo copiar automáticamente, cópialo manualmente: " + text);
        }
      });
    });

    body.querySelectorAll("[data-whatsapp]").forEach(btn => {
      btn.addEventListener("click", () => {
        const round = openRounds.find(r => r.id === btn.dataset.whatsapp);
        const text = reminderText(round, missingFor(round));
        window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank");
      });
    });
    wireSpectatorLinkCard(body);
  }

  function blankMatch(){ return {id: uid("m"), teamA:"", teamB:""}; }

  function toLocalInputValue(iso){
    const d = new Date(iso);
    const pad = n => String(n).padStart(2,'0');
    return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()) + "T" + pad(d.getHours()) + ":" + pad(d.getMinutes());
  }

  async function renderAdminRondas(body){
    const editingId = renderAdminRondas._editingId || null;
    const editingRound = editingId ? meta.rounds.find(r => r.id === editingId) : null;
    const nextNumber = meta.rounds.length ? Math.max(...meta.rounds.map(r=>r.number))+1 : 1;

    // Only block creating brand-new rounds — editing/managing existing ones stays available.
    const blockingStatus = !editingRound ? await getPaymentStatus() : null;

    let draft = renderAdminRondas._draft;
    if(!draft){
      draft = editingRound
        ? { matches: editingRound.matches.map(m => ({...m})), deadline: toLocalInputValue(editingRound.deadline) }
        : { matches: [blankMatch(), blankMatch()], deadline: "" };
      renderAdminRondas._draft = draft;
    }
    const teamOptions = TEAMS.map(t=>`<option value="${esc(t)}">`).join("");

    function matchRowHtml(m, idx){
      return `
        <div class="match-edit-row" data-mid="${m.id}">
          <div class="field" style="margin-bottom:0;"><label>Local</label><input list="qz-teams" type="text" value="${esc(m.teamA)}" data-role="teamA"></div>
          <div class="field" style="margin-bottom:0;"><label>Visitante</label><input list="qz-teams" type="text" value="${esc(m.teamB)}" data-role="teamB"></div>
          <button class="icon-x" data-remove="${m.id}" title="Quitar partido">✕</button>
        </div>
      `;
    }

    const createCardHtml = blockingStatus ? `
      <div class="card" style="border-color:var(--red);">
        <div class="eyebrow" style="color:var(--red);">🔒 No se pueden crear jornadas nuevas</div>
        <p>Esta quiniela ya jugó sus ${blockingStatus.jornadaLimit} jornadas gratis y todavía no se registra el pago. Deposita <strong>$${blockingStatus.amount} MXN</strong>:</p>
        <p class="muted" style="white-space:pre-wrap;">${esc(blockingStatus.depositInfo)}</p>
        <p class="muted">En cuanto se confirme el pago, se vuelve a habilitar automáticamente. Mientras tanto puedes seguir usando todo lo demás (resultados, tabla, editar jornadas existentes).</p>
      </div>
    ` : `
      <div class="card">
        <div class="eyebrow">${editingRound ? `Editando jornada ${editingRound.number}` : `Crear jornada ${nextNumber}`}</div>
        ${editingRound && editingRound.resultsPublished ? `<p class="muted" style="color:var(--red);">Esta jornada ya tiene resultados publicados. Si cambias los equipos, los resultados guardados podrían dejar de tener sentido — revísalos después de guardar.</p>` : ``}
        <div id="qz-match-rows">${draft.matches.map(matchRowHtml).join("")}</div>
        <button class="btn btn-ghost btn-sm" id="qz-add-match" style="margin-bottom:14px;">+ Agregar partido</button>
        <div class="field">
          <label>Fecha y hora límite para votar</label>
          <input type="datetime-local" id="qz-deadline" value="${draft.deadline}">
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary" id="qz-publish-round" style="flex:1;padding:12px;">${editingRound ? "Guardar cambios" : `Publicar jornada ${nextNumber}`}</button>
          ${editingRound ? `<button class="btn btn-ghost" id="qz-cancel-edit" style="padding:12px;">Cancelar</button>` : ``}
        </div>
      </div>
    `;

    body.innerHTML = `
      <datalist id="qz-teams">${teamOptions}</datalist>
      ${createCardHtml}
      <div class="card">
        <div class="eyebrow">Jornadas existentes</div>
        ${meta.rounds.length ? meta.rounds.slice().reverse().map(r => `
          <div class="history-item">
            <div><strong>Jornada ${r.number}</strong> <span class="muted">· ${r.matches.length} partidos · ${r.resultsPublished ? 'resultados capturados' : (isRoundLocked(r) ? 'cerrada, sin resultados' : 'abierta')}</span></div>
            <div style="display:flex;gap:6px;">
              <button class="btn btn-ghost btn-sm" data-edit-round="${r.id}">Editar</button>
              <button class="btn btn-danger btn-sm" data-del-round="${r.id}">Eliminar</button>
            </div>
          </div>
        `).join("") : `<p class="muted">Aún no has creado ninguna jornada.</p>`}
      </div>
    `;

    if(blockingStatus){
      // Only the "edit existing round" and "delete round" actions apply while blocked.
      body.querySelectorAll("[data-edit-round]").forEach(btn => {
        btn.addEventListener("click", () => {
          renderAdminRondas._editingId = btn.dataset.editRound;
          renderAdminRondas._draft = null;
          renderAdminRondas(body);
        });
      });
      body.querySelectorAll("[data-del-round]").forEach(btn => {
        btn.addEventListener("click", async () => {
          if(!confirm("¿Eliminar esta jornada y sus resultados? Esta acción no se puede deshacer.")) return;
          meta.rounds = meta.rounds.filter(r => r.id !== btn.dataset.delRound);
          await setMeta(meta);
          renderAdmin(document.getElementById("qz-main"));
        });
      });
      return;
    }

    function wireRows(){
      document.querySelectorAll("#qz-match-rows [data-mid]").forEach(row => {
        const mid = row.dataset.mid;
        row.querySelectorAll("input").forEach(inp => {
          inp.addEventListener("input", () => {
            const m = draft.matches.find(x=>x.id===mid);
            m[inp.dataset.role] = inp.value;
          });
        });
        row.querySelector("[data-remove]").addEventListener("click", () => {
          draft.matches = draft.matches.filter(x=>x.id!==mid);
          renderAdminRondas(body);
        });
      });
    }
    wireRows();

    document.getElementById("qz-add-match").addEventListener("click", () => {
      draft.matches.push(blankMatch());
      renderAdminRondas(body);
    });
    document.getElementById("qz-deadline").addEventListener("input", (e) => { draft.deadline = e.target.value; });

    body.querySelectorAll("[data-edit-round]").forEach(btn => {
      btn.addEventListener("click", () => {
        renderAdminRondas._editingId = btn.dataset.editRound;
        renderAdminRondas._draft = null;
        renderAdminRondas(body);
      });
    });
    const cancelBtn = document.getElementById("qz-cancel-edit");
    if(cancelBtn){
      cancelBtn.addEventListener("click", () => {
        renderAdminRondas._editingId = null;
        renderAdminRondas._draft = null;
        renderAdminRondas(body);
      });
    }

    document.getElementById("qz-publish-round").addEventListener("click", async () => {
      const clean = draft.matches.filter(m => m.teamA.trim() && m.teamB.trim());
      if(!clean.length){ toast("Agrega al menos un partido con ambos equipos"); return; }
      if(!draft.deadline){ toast("Selecciona la fecha y hora límite"); return; }

      if(editingRound){
        editingRound.matches = clean;
        editingRound.deadline = new Date(draft.deadline).toISOString();
        const ok = await setMeta(meta);
        if(ok){
          toast("Jornada " + editingRound.number + " actualizada ✅");
          renderAdminRondas._editingId = null;
          renderAdminRondas._draft = null;
          renderAdmin(document.getElementById("qz-main"));
        } else {
          toast("No se pudo guardar, intenta otra vez");
        }
        return;
      }

      const round = {
        id: uid("r"),
        number: nextNumber,
        matches: clean,
        deadline: new Date(draft.deadline).toISOString(),
        results: {},
        resultsPublished: false
      };
      meta.rounds.push(round);
      const ok = await setMeta(meta);
      if(ok){
        toast("Jornada " + nextNumber + " publicada ✅");
        renderAdminRondas._draft = null;
        renderAdmin(document.getElementById("qz-main"));
      } else {
        toast("No se pudo guardar, intenta otra vez");
      }
    });

    body.querySelectorAll("[data-del-round]").forEach(btn => {
      btn.addEventListener("click", async () => {
        if(!confirm("¿Eliminar esta jornada y sus resultados? Esta acción no se puede deshacer.")) return;

  // ---------- TheSportsDB auto-fill (free API, best-effort suggestions) ----------
  // Curated list of common competitions — each quiniela picks one in Ajustes.
  const SPORTSDB_LEAGUES = [
    { id: "4350", label: "Liga MX" },
    { id: "4328", label: "Premier League (Inglaterra)" },
    { id: "4335", label: "La Liga (España)" },
    { id: "4331", label: "Bundesliga (Alemania)" },
    { id: "4332", label: "Serie A (Italia)" },
    { id: "4334", label: "Ligue 1 (Francia)" },
    { id: "4480", label: "UEFA Champions League" }
  ];
  // Known aliases where the typed name and TheSportsDB's name don't share any
  // text in common (e.g. "Chivas" vs "CD Guadalajara") — mostly Liga MX quirks.
  // For any team not listed here, matching falls back to fuzzy name comparison,
  // which works fine for most leagues since names are usually similar enough
  // (e.g. "Real Madrid" vs "Real Madrid", "Barcelona" vs "FC Barcelona").
  const SPORTSDB_TEAM_ALIASES = {
    "América": "CF America",
    "Chivas": "CD Guadalajara",
    "Juárez": "FC Juarez",
    "Querétaro": "Queretaro FC",
    "Santos": "Santos Laguna",
    "Xolos": "Tijuana"
  };
  let sportsdbCache = null; // {leagueId, season, events}

  async function fetchSportsdbSeason(leagueId, season){
    if(sportsdbCache && sportsdbCache.leagueId === leagueId && sportsdbCache.season === season) return sportsdbCache.events;
    const url = `https://www.thesportsdb.com/api/v1/json/123/eventsseason.php?id=${leagueId}&s=${encodeURIComponent(season)}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const events = data.events || [];
    sportsdbCache = { leagueId, season, events };
    return events;
  }

  function normalizeTeamName(s){
    return (s || "")
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/\b(fc|cf|cd|afc|sc|ac|club|de)\b/g, "")
      .replace(/[^a-z0-9]+/g, "");
  }

  function teamsMatch(ourName, sportsdbName){
    const resolved = SPORTSDB_TEAM_ALIASES[ourName] || ourName;
    const a = normalizeTeamName(resolved);
    const b = normalizeTeamName(sportsdbName);
    if(!a || !b) return false;
    return a === b || a.includes(b) || b.includes(a);
  }

  function findAutoResult(events, m, roundDeadline){
    const targetTime = new Date(roundDeadline).getTime();
    let best = null, bestDiff = Infinity;
    events.forEach(ev => {
      const home = ev.strHomeTeam, away = ev.strAwayTeam;
      const straight = teamsMatch(m.teamA, home) && teamsMatch(m.teamB, away);
      const swapped = teamsMatch(m.teamB, home) && teamsMatch(m.teamA, away);
      if(!straight && !swapped) return;
      if(ev.intHomeScore === null || ev.intHomeScore === undefined || ev.intHomeScore === "") return; // not played yet
      const evTime = new Date(ev.dateEvent).getTime();
      const diff = Math.abs(evTime - targetTime);
      if(diff < bestDiff && diff < 1000*60*60*24*20){ // within ~20 days of our deadline
        bestDiff = diff;
        const hs = Number(ev.intHomeScore), as = Number(ev.intAwayScore);
        let result;
        if(straight) result = hs > as ? 'A' : hs < as ? 'B' : 'D';
        else result = hs > as ? 'B' : hs < as ? 'A' : 'D';
        best = { result, date: ev.dateEvent, score: hs + "-" + as };
      }
    });
    return best;
  }

        a.download = "respaldo-" + slugify(meta.groupName) + "-" + new Date().toISOString().slice(0,10) + ".json";
        a.click();
        URL.revokeObjectURL(url);
        toast("Respaldo descargado ✅");
      }catch(e){
        console.error(e);
        toast("No se pudo generar el respaldo");
      }
      btn.disabled = false;
      btn.textContent = originalText;
    });
    document.getElementById("qz-save-settings").addEventListener("click", async () => {
      meta.groupName = document.getElementById("qz-group-name").value.trim() || meta.groupName;
      meta.settings.entryFee = Number(document.getElementById("qz-fee").value) || meta.settings.entryFee;
      const pppRaw = document.getElementById("qz-points-per-pick").value.trim();
      meta.settings.pointsPerCorrectPick = pppRaw === "" ? 1 : Number(pppRaw);
      meta.settings.ownerPassword = document.getElementById("qz-owner-pw-set").value.trim() || meta.settings.ownerPassword;
      meta.settings.sportsdbLeagueId = document.getElementById("qz-sportsdb-league").value;
      meta.settings.sportsdbSeason = document.getElementById("qz-sportsdb-season").value.trim() || meta.settings.sportsdbSeason;
      sportsdbCache = null;
      await setMeta(meta);
      toast("Ajustes guardados ✅");
      renderApp();
    });
    document.getElementById("qz-close-tournament").addEventListener("click", async () => {
      const playedRounds = meta.rounds.filter(r => r.resultsPublished);
      if(!playedRounds.length){
        if(!confirm("Todavía no hay jornadas con resultados. ¿De todos modos quieres cerrar y limpiar el torneo?")) return;
      }
      await ensureAllPicksLoaded();
      const finalStandings = standingsList().map(p => ({ name: p.name, pts: p.pts }));
      const champion = finalStandings.length ? finalStandings[0] : null;
      const confirmMsg = champion
        ? `🏆 El campeón es ${champion.name} con ${champion.pts} puntos.\n\nEsto se va a guardar en el historial y se van a borrar las jornadas activas para empezar un torneo nuevo. ¿Confirmas?`
        : "Se va a cerrar el torneo (sin jornadas jugadas) y se van a borrar las jornadas activas. ¿Confirmas?";
      if(!confirm(confirmMsg)) return;

      if(!meta.pastTournaments) meta.pastTournaments = [];
      meta.pastTournaments.push({
        closedAt: new Date().toISOString(),
        champion,
        standings: finalStandings,
        rounds: meta.rounds
      });
      meta.rounds = [];
      meta.participants.forEach(p => p.paid = false);
      const ok = await setMeta(meta);
      if(ok){
        toast(champion ? `Torneo cerrado 🏆 Campeón: ${champion.name}` : "Torneo cerrado");
      } else {
        toast("No se pudo guardar, intenta de nuevo");
      }
      renderAdmin(document.getElementById("qz-main"));
    });

    const migrateBtn = document.getElementById("qz-migrate-btn");
    if(migrateBtn){
      migrateBtn.addEventListener("click", async () => {
        const statusEl = document.getElementById("qz-migrate-status");
        const slug = slugify(document.getElementById("qz-migrate-slug").value);
        if(!slug){ statusEl.textContent = "Escribe un link válido."; statusEl.style.color = "var(--red)"; return; }
        if(!confirm(`¿Mover esta quiniela a tusitio.com/q/${slug}? El link principal dejará de mostrarla — tendrás que compartir el nuevo link con tu grupo.`)) return;

        migrateBtn.disabled = true;
        statusEl.textContent = "Moviendo datos…";
        statusEl.style.color = "var(--ink-soft)";
        try{
          const idx = await getPlatformIndex();
          if(idx.quinielas.some(q => q.slug === slug)){
            statusEl.textContent = "Ese link ya está en uso, elige otro.";
            statusEl.style.color = "var(--red)";
            migrateBtn.disabled = false;
            return;
          }
          const okMeta = await kvSet(metaKeyFor(slug), meta);
          if(!okMeta) throw new Error("no se pudo copiar la quiniela");

          for(const p of meta.participants){
            const picks = await getPicks(p.id); // still resolves to the root/legacy key at this point
            await kvSet("quiniela:" + slug + ":picks:" + p.id, picks);
          }

          idx.quinielas.push({
            slug, name: meta.groupName, creatorName: currentUser.name,
            createdAt: new Date().toISOString(), exempt: true
          });
          const okIdx = await setPlatformIndex(idx);
          if(!okIdx) throw new Error("no se pudo registrar en la plataforma");

          const okFlag = await kvSet(currentMetaKey(), { migratedTo: slug });
          if(!okFlag) throw new Error("no se pudo cerrar el link viejo");

          statusEl.textContent = "";
          body.innerHTML = `
            <div class="card">
              <div class="eyebrow">✅ Listo</div>
              <p class="muted">Tu quiniela ya vive en su propio link. Comparte este link nuevo con tu grupo — el link principal ya no la mostrará.</p>
              <div class="field"><input type="text" readonly value="${window.location.origin}/q/${esc(slug)}" id="qz-migrate-newlink"></div>
              <button class="btn btn-gold" id="qz-migrate-copy">Copiar link</button>
            </div>
          `;
          document.getElementById("qz-migrate-copy").addEventListener("click", async () => {
            try{
              await navigator.clipboard.writeText(window.location.origin + "/q/" + slug);
              toast("Link copiado ✅");
            }catch(e){
              toast("Cópialo manualmente del cuadro de texto");
            }
          });
        }catch(e){
          console.error(e);
          statusEl.textContent = "Algo falló durante el movimiento: " + e.message + ". Tus datos originales siguen intactos, puedes reintentar.";
          statusEl.style.color = "var(--red)";
          migrateBtn.disabled = false;
        }
      });
    }
  }

  // ---------- EXCEL EXPORT ----------
  async function exportExcel(){
    toast("Generando Excel…");
    await ensureAllPicksLoaded();
    const wb = XLSX.utils.book_new();

    // Standings
    const standings = standingsList().map((p,i) => ({
      "#": i+1, "Participante": p.name, "Puntos": p.pts, "Pagó": p.paid ? "Sí" : "No"
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(standings), "Tabla");

    // Jornada detail (matrix)
    const detailRows = [];
    meta.rounds.filter(r=>r.resultsPublished).forEach(r => {
      r.matches.forEach(m => {
        const row = { "Jornada": r.number, "Partido": m.teamA + " vs " + m.teamB, "Resultado": r.results[m.id] === 'A' ? m.teamA : r.results[m.id]==='B' ? m.teamB : "Empate" };
        meta.participants.forEach(p => {
          const pick = ((allPicksCache[p.id]||{})[r.id]||{})[m.id];
          row[p.name] = pick === 'A' ? m.teamA : pick === 'B' ? m.teamB : pick === 'D' ? "Empate" : "";
        });
        detailRows.push(row);
      });
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(detailRows), "Jornada detalle");

    // Participant stats
    const statsRows = meta.participants.map(p => {
      let correct=0, total=0, best=0, worst=null;
      meta.rounds.filter(r=>r.resultsPublished).forEach(r => {
        let roundCorrect=0, roundTotal=0;
        r.matches.forEach(m => {
          const result = r.results[m.id];
          const pick = ((allPicksCache[p.id]||{})[r.id]||{})[m.id];
          if(result){ roundTotal++; total++; if(pick===result){ roundCorrect++; correct++; } }
        });
        if(roundTotal>0){
          best = Math.max(best, roundCorrect);
          worst = worst===null ? roundCorrect : Math.min(worst, roundCorrect);
        }
      });
      return {
        "Participante": p.name,
        "Puntos totales": pointsFor(p.id).pts,
        "Partidos jugados": total,
        "% Acierto": total ? Math.round((correct/total)*1000)/10 + "%" : "0%",
        "Mejor jornada (aciertos)": best,
        "Peor jornada (aciertos)": worst===null?0:worst
      };
    }).sort((a,b)=>b["Puntos totales"]-a["Puntos totales"]);
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(statsRows), "Estadísticas");

    // Payments
    const paymentRows = meta.participants.map(p => ({
      "Participante": p.name,
      "Cuota": meta.settings.entryFee,
      "Pagó": p.paid ? "Sí" : "No"
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(paymentRows), "Pagos");

    XLSX.writeFile(wb, "quiniela_" + meta.groupName.replace(/\s+/g,"_") + ".xlsx");
    toast("Excel descargado ✅");
  }

      const creatorName = draft.creatorName.trim();
      const contact = draft.contact.trim();

            <label>Datos para depositar</label>
            <textarea id="qz-p-deposit" rows="3" style="width:100%;padding:9px 11px;border-radius:8px;border:1.5px solid var(--line);font-family:inherit;font-size:14px;" placeholder="Ej. Banco XYZ, CLABE 0123456789, a nombre de...">${esc(settings.depositInfo || "")}</textarea>
            <p class="muted" style="margin-top:4px;">Esto se le muestra automáticamente al admin de cualquier quiniela que ya deba pagar.</p>
          </div>
          <button class="btn btn-primary" id="qz-p-save">Guardar configuración</button>
        </div>
      </div>
    `;
    document.getElementById("qz-p-save").addEventListener("click", async () => {
      const newSettings = {
        jornadaLimit: Number(document.getElementById("qz-p-threshold").value) || settings.jornadaLimit,
        pricePerParticipant: Number(document.getElementById("qz-p-price").value) || settings.pricePerParticipant,
        dashboardPassword: document.getElementById("qz-p-newpass").value.trim() || settings.dashboardPassword,
        depositInfo: document.getElementById("qz-p-deposit").value
      };
      const ok = await setPlatformSettings(newSettings);
      toast(ok ? "Configuración guardada ✅" : "No se pudo guardar");
      renderPlatformDashboard();
    });

    root.querySelectorAll("[data-edit-slug]").forEach(btn => {
      btn.addEventListener("click", () => {
        renderPlatformDashboard._editingSlug = btn.dataset.editSlug;
        renderPlatformDashboard();
      });
    });
    const cancelEditBtn = root.querySelector("[data-cancel-edit]");
    if(cancelEditBtn){
      cancelEditBtn.addEventListener("click", () => {
        renderPlatformDashboard._editingSlug = null;
        renderPlatformDashboard();
      });
    }
    const saveEditBtn = root.querySelector("[data-save-edit]");
    if(saveEditBtn){
      saveEditBtn.addEventListener("click", async () => {
        const slug = saveEditBtn.dataset.saveEdit;
        const newName = document.getElementById("qz-edit-name").value.trim();
        const newPass = document.getElementById("qz-edit-pass").value.trim();
        const thresholdRaw = document.getElementById("qz-edit-threshold").value.trim();
        saveEditBtn.disabled = true;
        try{
          const r = await kvGet(metaKeyFor(slug));
          if(!r.found) throw new Error("no se encontró la quiniela");
          const tenantMeta = r.value;
          if(newName) tenantMeta.groupName = newName;
          if(newPass) tenantMeta.settings.ownerPassword = newPass;
          const ok = await kvSet(metaKeyFor(slug), tenantMeta);
          if(!ok) throw new Error("no se pudo guardar");
          const entry = idx.quinielas.find(q => q.slug === slug);
          if(entry && newName) entry.name = newName;
          if(entry) entry.customJornadaLimit = thresholdRaw === "" ? null : Number(thresholdRaw);
          await setPlatformIndex(idx);
          toast("Quiniela actualizada ✅");
          renderPlatformDashboard._editingSlug = null;
          renderPlatformDashboard();
        }catch(e){
          console.error(e);
          toast("No se pudo guardar: " + e.message);
          saveEditBtn.disabled = false;
        }
      });
    }

    root.querySelectorAll("[data-delete-slug]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const slug = btn.dataset.deleteSlug;
        const q = rows.find(r => r.slug === slug);
        if(!confirm(`¿Eliminar "${q ? q.name : slug}" para siempre? Se borran todas sus jornadas, resultados y picks. Esto NO se puede deshacer.`)) return;
        btn.disabled = true;
        try{
          const r = await kvGet(metaKeyFor(slug));
          if(r.found){
            const participants = r.value.participants || [];
            await Promise.all(participants.map(p => kvDelete("quiniela:" + slug + ":picks:" + p.id)));
          }
          await kvDelete(metaKeyFor(slug));
          idx.quinielas = idx.quinielas.filter(x => x.slug !== slug);
          await setPlatformIndex(idx);
          toast("Quiniela eliminada");
          renderPlatformDashboard();
        }catch(e){
          console.error(e);
          toast("No se pudo eliminar, intenta de nuevo");
          btn.disabled = false;
        }
      });
    });
    root.querySelectorAll("[data-exempt-toggle]").forEach(checkbox => {
      checkbox.addEventListener("change", async () => {
        const tr = checkbox.closest("tr");
        const slug = tr.dataset.slug;
        const entry = idx.quinielas.find(q => q.slug === slug);
        if(!entry) return;
        entry.exempt = checkbox.checked;
        const ok = await setPlatformIndex(idx);
        if(ok){
          const rowData = rows.find(r => r.slug === slug);
          rowData.exempt = checkbox.checked;
          tr.querySelector(".qz-status-cell").innerHTML = statusBadge(rowData);
          toast(checkbox.checked ? "Marcada como exenta ⭐" : "Ya no está exenta");
        } else {
          checkbox.checked = !checkbox.checked;
          toast("No se pudo guardar, intenta de nuevo");
        }
      });
    });

    root.querySelectorAll("[data-paid-toggle]").forEach(checkbox => {
      checkbox.addEventListener("change", async () => {
        const tr = checkbox.closest("tr");
        const slug = tr.dataset.slug;
        const entry = idx.quinielas.find(q => q.slug === slug);
        if(!entry) return;
        const rowData = rows.find(r => r.slug === slug);
        entry.paid = checkbox.checked;
        const ok = await setPlatformIndex(idx);
        if(ok){
          rowData.paid = checkbox.checked;
          tr.querySelector(".qz-status-cell").innerHTML = statusBadge(rowData);
          toast(checkbox.checked ? "Marcada como pagada ✅" : "Ya no está marcada como pagada");
          if(checkbox.checked){
            const paymentLog = await getPlatformPaymentLog();
            paymentLog.payments.push({
              slug, name: entry.name,
              amount: settings.pricePerParticipant * (rowData.count || 0),
              date: new Date().toISOString()
            });
            await setPlatformPaymentLog(paymentLog);
          }
        } else {
          checkbox.checked = !checkbox.checked;
          toast("No se pudo guardar, intenta de nuevo");
        }
      });
    });

    root.querySelectorAll("[data-view-slug]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const slug = btn.dataset.viewSlug;
        const panel = document.getElementById("qz-inspect-panel");
        panel.innerHTML = `<div class="card"><p class="muted">Cargando resumen de /q/${esc(slug)}…</p></div>`;
        panel.scrollIntoView({behavior:"smooth", block:"nearest"});
        try{
          const r = await kvGet(metaKeyFor(slug));
          if(!r.found){ panel.innerHTML = `<div class="card"><p class="muted">No se encontró esa quiniela.</p></div>`; return; }
          const tenantMeta = r.value;
          const picksCache = {};
          await Promise.all(tenantMeta.participants.map(async p => {
            try{
              const pr = await kvGet("quiniela:" + slug + ":picks:" + p.id);
              picksCache[p.id] = pr.found ? pr.value : {};
            }catch(e){ picksCache[p.id] = {}; }
          }));
          function pointsForInspect(pid){
            const perPick = (tenantMeta.settings && tenantMeta.settings.pointsPerCorrectPick != null) ? tenantMeta.settings.pointsPerCorrectPick : 1;
            let pts = 0;
            tenantMeta.rounds.forEach(rnd => {
              if(!rnd.resultsPublished) return;
              rnd.matches.forEach(m => {
                const result = rnd.results ? rnd.results[m.id] : null;
                if(!result) return;
                const pick = picksCache[pid] && picksCache[pid][rnd.id] ? picksCache[pid][rnd.id][m.id] : null;
                if(pick && pick === result) pts += perPick;
              });
            });
            const p = tenantMeta.participants.find(x => x.id === pid);
            (tenantMeta.customBets || []).forEach(bet => {
              if(bet.scope === "temporada"){
                const ans = p && p.customBetAnswers && p.customBetAnswers[bet.id];
                if(ans && ans.correct === true) pts += bet.points;
              } else if(bet.scope === "jornada"){
                tenantMeta.rounds.forEach(r => {
                  const res = r.customBetResults && r.customBetResults[bet.id];
                  if(res && res[pid] === true) pts += bet.points;
                });
              }
            });
            if(!tenantMeta.customBetsMigrated){
              // This quiniela hasn't opened its own app since the upgrade yet — fall back to the old field.
              const gsb = tenantMeta.golScorerBet;
              if(gsb && gsb.enabled && p && p.golScorerCorrect === true) pts += (gsb.bonusPoints != null ? gsb.bonusPoints : 3);
            }
            const penalty = tenantMeta.paymentPenalty;
            if(penalty && penalty.enabled && penalty.startsAtRound && p && !p.paid){
              const passedRounds = tenantMeta.rounds.filter(r => r.resultsPublished && r.number >= penalty.startsAtRound).length;
              const perRound = penalty.pointsPerRound != null ? penalty.pointsPerRound : 1;
              pts -= passedRounds * perRound;
            }
            return pts;
          }
          const standings = tenantMeta.participants
            .map(p => ({ name: p.name, pts: pointsForInspect(p.id) }))
            .sort((a,b) => b.pts - a.pts);
          const roundsSummary = tenantMeta.rounds.slice().sort((a,b)=>a.number-b.number).map(r => {
            const status = r.resultsPublished ? "resultados publicados" : (new Date(r.deadline).getTime() < Date.now() ? "cerrada, sin resultados" : "abierta");
            return `Jornada ${r.number} (${r.matches.length} partidos) — ${status}`;
          });
          panel.innerHTML = `
            <div class="card">
              <div class="eyebrow" style="display:flex;justify-content:space-between;align-items:center;">
                <span>👁 ${esc(tenantMeta.groupName)} — solo lectura</span>
                <button class="btn btn-ghost btn-sm" id="qz-inspect-close">Cerrar</button>
              </div>
              <p class="muted">${tenantMeta.participants.length} participantes · ${tenantMeta.rounds.length} jornadas creadas</p>
              <div class="row2">
                <div>
                  <div class="eyebrow">Tabla</div>
                  <table>
                    <thead><tr><th>Participante</th><th>Pts</th></tr></thead>
                    <tbody>${standings.map(s => `<tr><td>${esc(s.name)}</td><td>${s.pts}</td></tr>`).join("")}</tbody>
                  </table>
                </div>
                <div>
                  <div class="eyebrow">Jornadas</div>
                  ${roundsSummary.length ? `<ul style="margin:0;padding-left:18px;">${roundsSummary.map(s => `<li class="muted">${esc(s)}</li>`).join("")}</ul>` : `<p class="muted">Sin jornadas todavía.</p>`}
                </div>
              </div>
            </div>
          `;
          document.getElementById("qz-inspect-close").addEventListener("click", () => { panel.innerHTML = ""; });
        }catch(e){
          console.error(e);
          panel.innerHTML = `<div class="card"><p class="muted">No se pudo cargar el resumen.</p></div>`;
        }
      });
    });
  }

  function renderHome(){
    root.innerHTML = `
      <div class="login-wrap">
        <div class="login-card" style="max-width:440px;text-align:center;">
          <div class="login-title display" style="font-size:36px;">Quinielas</div>
          <p class="login-sub">Crea tu propia quiniela de Liga MX para tu grupo de amigos — jornadas, resultados y tabla de posiciones, todo en un link que solo ustedes usan.</p>
          <a href="/crear" class="btn btn-primary" style="display:block;padding:14px;text-decoration:none;margin-top:8px;">Crear mi quiniela</a>
          <p class="muted" style="margin-top:18px;">¿Ya tienes una? Pídele el link a quien la creó.</p>
        </div>
      </div>
    `;
  }

  function renderMigratedNotice(slug){
    root.innerHTML = `
      <div class="login-wrap">
        <div class="login-card" style="text-align:center;">
          <div class="login-title display" style="font-size:28px;">Esta quiniela se movió</div>
          <p class="login-sub">Tiene un nuevo link permanente:</p>
          <a href="/q/${encodeURIComponent(slug)}" class="btn btn-primary" style="display:block;padding:14px;text-decoration:none;margin-bottom:8px;">Ir a la quiniela</a>
          <p class="muted">Actualiza tus favoritos/enlaces compartidos a: <strong>${esc(window.location.origin)}/q/${esc(slug)}</strong></p>
        </div>
      </div>
    `;
  }

  // "Solo ver": read-only view for people who aren't participants — no name, no PIN,
  // just the standings and a list of jornadas played. Reached via /q/slug?ver=1
  async function renderSpectatorView(){
    root.innerHTML = `<div class="login-wrap"><div class="login-card"><p class="muted" style="text-align:center;">Cargando…</p></div></div>`;
    await ensureAllPicksLoaded();
    const list = standingsList();
    const fee = meta.settings.entryFee;
    const paidCount = meta.participants.filter(p=>p.paid).length;
    const totalP = meta.participants.length;
    const published = meta.rounds.filter(r=>r.resultsPublished).slice().reverse();
    root.innerHTML = `
      <div class="qz-header">
        <div class="qz-header-top">
          <div class="qz-brand"><span class="display">${esc(meta.groupName)}</span><span class="display dot">.</span></div>
          <div class="qz-user-chip">👁 Solo ver</div>
        </div>
      </div>
      <div class="qz-main">
        <div class="section-title"><span class="display">Tabla de posiciones</span></div>
        <div class="card">
          <div class="row2">
            <div><div class="eyebrow">Cuota por persona</div><div class="display" style="font-size:26px;">$${fee}</div></div>
            <div><div class="eyebrow">Recaudado</div><div class="display" style="font-size:26px;">$${paidCount*fee} <span class="muted" style="font-family:'Work Sans';font-size:13px;">de $${totalP*fee}</span></div></div>
          </div>
        </div>
        <div class="card" style="padding:8px 12px;">
          <table>
            <thead><tr><th style="text-align:center;">#</th><th>Participante</th><th style="text-align:center;">Pts</th></tr></thead>
            <tbody>
              ${list.map((p,i) => `
                <tr>
                  <td class="pos ${i===0?'top1':''}" style="text-align:center;">${i+1}</td>
                  <td>${esc(p.name)} ${p.isAdmin?'<span class="badge admin">ADMIN</span>':''}</td>
                  <td style="text-align:center;font-weight:700;">${p.pts}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
        ${published.length ? `
          <div class="section-title" style="margin-top:20px;"><span class="display" style="font-size:22px;">Jornadas jugadas</span></div>
          <div class="card">
            ${published.map(r => `<div class="history-item"><div><strong>Jornada ${r.number}</strong> <span class="muted">· ${r.matches.length} partidos</span></div></div>`).join("")}
          </div>
        ` : ``}
        <p class="muted" style="text-align:center;margin-top:20px;">👁 Estás viendo esta quiniela en modo solo lectura — no puedes votar ni modificar nada.</p>
      </div>
    `;
  }

  async function boot(attempt){
    attempt = attempt || 1;

    if(ROUTE === "crear"){ renderCrear(); return; }
    if(ROUTE === "unknown"){ renderUnknownRoute(); return; }
    if(ROUTE === "platform"){ renderPlatformDashboard(); return; }

    root.innerHTML = `<div class="login-wrap"><div class="login-card"><p class="muted" style="text-align:center;">Cargando…</p></div></div>`;
    let m;
    try{
      m = await getMeta();
    }catch(e){
      console.error("boot: failed to load data", e);
      // Never initialize fresh data on a failed request — only retry.
      if(attempt < 3){
        setTimeout(() => boot(attempt + 1), 1200);
        return;
      }
      renderBootError("No pudimos cargar los datos de la quiniela. Puede ser que el servidor apenas esté despertando (tarda ~30-60 segundos la primera vez) o un problema de conexión.", () => boot(1));
      return;
    }
    if(m === null){
      if(ROUTE === "quiniela"){
        // A /q/:slug that doesn't exist — never silently create data under someone else's link.
        renderQuinielaNotFound();
        return;
      }
      // ROUTE === "root": nothing here anymore (or never was) — show the public home page.
      renderHome();
      return;
    }
    if(ROUTE === "root" && m.migratedTo){
      renderMigratedNotice(m.migratedTo);
      return;
    }
    meta = m;
    if(new URLSearchParams(window.location.search).has("ver")){
      renderSpectatorView();
      return;
    }
    render();
  }
  boot();
})();
</script>
</body>
</html>
