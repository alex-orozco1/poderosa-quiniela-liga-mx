<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">QRACKS</title>
<meta property="og:type" content="website">
<meta property="og:site_name" content="QRACKS">
<meta property="og:title" content="QRACKS" id="og-title">
<meta property="og:description" content="Crea quinielas privadas, compite con tu grupo y deja que QRACKS controle el tiempo, los resultados y la tabla." id="og-description">
<meta property="og:image" content="https://qracks.net/og-image.png">
<meta property="og:url" content="https://qracks.net" id="og-url">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<style>
  :root{
    --pitch-dark:#0F2E22;
    --pitch:#173A2B;
    --pitch-light:#2D6A4F;
    --chalk:#F7F5EC;
    --paper:#FFFFFF;
    --gold:#D6A73C;
    --gold-dim:#B58F34;
    --red:#C1443A;
    --ink:#10231C;
    --ink-soft:#4B5B53;
    --line: rgba(16,35,28,0.12);
    --shadow: 0 6px 20px rgba(15,46,34,0.12);
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  #quiniela-root{
    font-family:'Manrope', sans-serif;
    background:var(--chalk);
    color:var(--ink);
    min-height:100%;
    line-height:1.4;
  }
  #quiniela-root .display{
    font-family:'Manrope', sans-serif;
    font-weight:800;
    letter-spacing:-0.01em;
  }
  #quiniela-root .mono{
    font-family:'Manrope', sans-serif;
    font-variant-numeric:tabular-nums;
    font-weight:700;
  }
  #quiniela-root button{
    font-family:inherit;
    cursor:pointer;
  }
  #quiniela-root .btn{
    border:none;
    border-radius:10px;
    padding:10px 16px;
    font-weight:600;
    font-size:14px;
    transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
  }
  #quiniela-root .btn:active{ transform:scale(0.97); }
  #quiniela-root .btn:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }
  #quiniela-root .btn-primary{ background:var(--pitch-dark); color:var(--chalk); }
  #quiniela-root .btn-primary:hover{ background:var(--pitch); }
  #quiniela-root .btn-gold{ background:var(--gold); color:var(--pitch-dark); }
  #quiniela-root .btn-gold:hover{ background:var(--gold-dim); }
  #quiniela-root .btn-ghost{ background:transparent; color:var(--pitch-dark); border:1.5px solid var(--line); }
  #quiniela-root .btn-ghost:hover{ background:rgba(15,46,34,0.06); }
  #quiniela-root .btn-danger{ background:var(--red); color:#fff; }
  #quiniela-root .btn-danger:hover{ opacity:0.88; }
  #quiniela-root .btn:disabled{ opacity:0.4; cursor:not-allowed; }
  #quiniela-root .btn-sm{ padding:6px 12px; font-size:12.5px; border-radius:8px; }

  /* header / scoreboard */
  #quiniela-root .qz-header{
    background: linear-gradient(180deg, var(--pitch-dark), var(--pitch));
    color:var(--chalk);
    padding:16px 20px 14px;
    position:sticky; top:0; z-index:20;
    box-shadow:var(--shadow);
  }
  #quiniela-root .qz-header-top{
    display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
  }
  #quiniela-root .qz-brand-mark{
    font-weight:800; font-size:15px; letter-spacing:0.08em; color:var(--gold);
    display:block; margin-bottom:2px;
  }
  #quiniela-root .qz-brand-context{
    font-weight:700; font-size:19px; line-height:1.25; color:var(--chalk);
  }
  #quiniela-root .qz-brand-round{
    font-weight:600; font-size:12.5px; color:rgba(247,245,236,0.65); margin-top:1px;
  }
  #quiniela-root .qz-user-dropdown{ position:relative; flex-shrink:0; }
  #quiniela-root .qz-user-toggle{
    display:flex; align-items:center; gap:6px;
    background:rgba(247,245,236,0.1);
    border:1px solid rgba(247,245,236,0.18);
    padding:7px 12px; border-radius:999px; color:var(--chalk);
    font-size:13px; font-weight:700;
  }
  #quiniela-root .qz-user-menu{
    position:absolute; right:0; top:calc(100% + 6px); z-index:30;
    background:var(--paper); border-radius:12px; box-shadow:0 12px 28px rgba(0,0,0,0.25);
    min-width:180px; overflow:hidden; border:1px solid var(--line);
  }
  #quiniela-root .qz-user-menu button{
    display:block; width:100%; text-align:left; padding:11px 14px; background:none; border:none;
    color:var(--ink); font-size:13.5px; font-weight:600;
  }
  #quiniela-root .qz-user-menu button:hover{ background:var(--chalk); }
  #quiniela-root .qz-user-menu button + button{ border-top:1px solid var(--line); }
  #quiniela-root .qz-tabs{
    display:flex; gap:4px; margin-top:14px; overflow-x:auto; padding-bottom:2px;
    scrollbar-width:none;
  }
  #quiniela-root .qz-tabs::-webkit-scrollbar{ display:none; }
  #quiniela-root .qz-tab{
    background:transparent; border:none; color:rgba(247,245,236,0.65);
    padding:8px 4px; font-weight:600; font-size:13.5px; white-space:nowrap;
    border-bottom:3px solid transparent; letter-spacing:0.01em;
  }
  #quiniela-root .qz-tab.active{ color:var(--chalk); border-bottom-color:var(--gold); }
  #quiniela-root .qz-dot{
    display:inline-block; width:8px; height:8px; border-radius:50%;
    background:var(--red); margin-left:5px; vertical-align:middle;
  }
  #quiniela-root .qz-tab + .qz-tab{ margin-left:14px; }

  #quiniela-root .qz-main{ max-width:760px; margin:0 auto; padding:20px 16px 80px; }

  /* cards */
  #quiniela-root .card{
    background:var(--paper); border-radius:var(--radius); border:1px solid var(--line);
    box-shadow:var(--shadow); padding:18px; margin-bottom:16px;
  }
  #quiniela-root .card-primary{
    background:var(--paper); border-radius:var(--radius); border:1.5px solid var(--pitch-dark);
    box-shadow:0 8px 24px rgba(15,46,34,0.16); padding:22px; margin-bottom:16px;
  }
  #quiniela-root .card-info{
    background:transparent; border-radius:var(--radius); border:1px dashed var(--line);
    box-shadow:none; padding:14px 18px; margin-bottom:16px;
  }
  #quiniela-root .card h3{ margin:0 0 4px; font-size:15px; }
  #quiniela-root .muted{ color:var(--ink-soft); font-size:13px; }
  #quiniela-root .eyebrow{
    text-transform:uppercase; letter-spacing:0.08em; font-size:11px; font-weight:700;
    color:var(--pitch-light); margin-bottom:6px;
  }

  /* clock */
  #quiniela-root .clock-card{
    background: linear-gradient(180deg, var(--pitch-dark), var(--pitch));
    color:var(--chalk); border-radius:var(--radius); padding:18px 20px; margin-bottom:16px;
    box-shadow:var(--shadow); position:relative; overflow:hidden;
  }
  #quiniela-root .clock-card::after{
    content:""; position:absolute; inset:0;
    background: radial-gradient(circle at 90% -10%, rgba(227,178,60,0.25), transparent 55%);
    pointer-events:none;
  }
  #quiniela-root .clock-label{ font-size:12px; text-transform:uppercase; letter-spacing:0.1em; opacity:0.75; margin-bottom:8px; }
  #quiniela-root .clock-digits{
    display:flex; gap:8px; flex-wrap:wrap;
  }
  #quiniela-root .clock-seg{
    background:rgba(0,0,0,0.28); border:1px solid rgba(227,178,60,0.35);
    border-radius:8px; padding:8px 12px; min-width:58px; text-align:center;
  }
  #quiniela-root .clock-seg .num{ font-size:26px; font-weight:700; color:var(--gold); display:block; }
  #quiniela-root .clock-seg .unit{ font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; opacity:0.7; }
  #quiniela-root .clock-closed{ font-size:15px; font-weight:600; color:var(--gold); }

  /* match card */
  #quiniela-root .match-card{
    background:var(--paper); border-radius:var(--radius); border:1px solid var(--line);
    padding:14px 16px; margin-bottom:12px; box-shadow:var(--shadow);
  }
  #quiniela-root .match-teams{
    display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px;
  }
  #quiniela-root .match-team{ font-weight:700; font-size:16px; flex:1; text-align:center; }
  #quiniela-root .match-team.left{ text-align:right; }
  #quiniela-root .match-team.right{ text-align:left; }
  #quiniela-root .match-vs{
    font-family:'Manrope', sans-serif; font-weight:700; font-size:11px; color:var(--ink-soft);
    background:var(--chalk); border-radius:6px; padding:3px 7px; flex-shrink:0;
  }
  #quiniela-root .pick-row{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  #quiniela-root .pick-btn{
    border:1.5px solid var(--line); background:var(--chalk); border-radius:10px;
    padding:10px 6px; font-weight:600; font-size:13px; color:var(--ink); text-align:center;
  }
  #quiniela-root .pick-btn.selected{ background:var(--pitch-dark); border-color:var(--pitch-dark); color:var(--chalk); }
  #quiniela-root .pick-btn.correct{ background:#DCEFE1; border-color:#2D6A4F; color:#1B4332; }
  #quiniela-root .pick-btn.wrong{ background:#F6E1DE; border-color:var(--red); color:#7d251d; }
  #quiniela-root .pick-btn:disabled{ cursor:default; }
  #quiniela-root .result-tag{
    margin-top:8px; font-size:12px; font-weight:700; text-align:center;
    color:var(--pitch-light);
  }

  /* login */
  #quiniela-root .login-wrap{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
    background: radial-gradient(circle at 50% 0%, var(--pitch-light), var(--pitch-dark) 70%);
  }
  #quiniela-root .login-card{
    background:var(--paper); border-radius:20px; padding:32px 28px; max-width:460px; width:100%;
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
  }
  #quiniela-root .login-title{ font-size:46px; text-align:center; line-height:1; margin-bottom:6px; }
  #quiniela-root .login-sub{ text-align:center; color:var(--ink-soft); font-size:17px; font-weight:600; margin-bottom:26px; }
  #quiniela-root .name-grid{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:10px; max-height:380px; overflow-y:auto; padding-right:2px;
  }
  #quiniela-root .name-btn{
    border:1.5px solid var(--line); background:var(--paper); border-radius:12px;
    padding:20px 14px; font-weight:700; font-size:18px; text-align:center;
    box-shadow:0 2px 6px rgba(15,46,34,0.08);
    transition:transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease;
    cursor:pointer;
  }
  #quiniela-root .name-btn:hover{
    border-color:var(--pitch-dark); background:var(--pitch-dark); color:var(--chalk);
    transform:translateY(-1px); box-shadow:0 4px 10px rgba(15,46,34,0.18);
  }
  #quiniela-root .name-btn:active{ transform:translateY(0); }
  #quiniela-root .name-btn:hover .role{ color:var(--gold); }
  #quiniela-root .name-btn .role{ display:block; font-size:12px; color:var(--gold-dim); font-weight:700; margin-top:4px; }

  /* table */
  #quiniela-root table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  #quiniela-root .qz-sticky-col{
    position:sticky; left:0; background:var(--paper); z-index:1;
    box-shadow:2px 0 4px rgba(0,0,0,0.06); white-space:nowrap;
  }
  #quiniela-root th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--ink-soft); padding:8px 6px; border-bottom:2px solid var(--line);
  }
  #quiniela-root td{ padding:9px 6px; border-bottom:1px solid var(--line); }
  #quiniela-root tr.me{ background:rgba(227,178,60,0.14); }
  #quiniela-root .pos{ font-family:'Manrope', sans-serif; font-weight:800; color:var(--pitch-light); }
  #quiniela-root .pos.top1{ color:var(--gold-dim); }

  /* platform dashboard table: roomier, centered headers, centered narrow columns */
  #quiniela-root .qz-platform-table th{ text-align:center; padding:10px 12px; }
  #quiniela-root .qz-platform-table td{ padding:14px 12px; vertical-align:middle; }
  #quiniela-root .qz-platform-table th:first-child, #quiniela-root .qz-platform-table td:first-child{ text-align:left; }
  #quiniela-root .qz-platform-table th:nth-child(2), #quiniela-root .qz-platform-table td:nth-child(2){ text-align:left; }
  #quiniela-root .qz-platform-table td:nth-child(3),
  #quiniela-root .qz-platform-table td:nth-child(4),
  #quiniela-root .qz-platform-table td:nth-child(5),
  #quiniela-root .qz-platform-table td:nth-child(6){ text-align:center; }
  #quiniela-root .qz-platform-table td:nth-child(5) input, #quiniela-root .qz-platform-table td:nth-child(6) input{
    width:20px; height:20px; cursor:pointer;
  }

  /* forms */
  #quiniela-root input[type=text], #quiniela-root input[type=password], #quiniela-root input[type=number], #quiniela-root input[type=datetime-local], #quiniela-root select{
    width:100%; padding:9px 11px; border-radius:8px; border:1.5px solid var(--line);
    font-family:inherit; font-size:14px; background:var(--paper); color:var(--ink);
  }
  #quiniela-root label{ font-size:12px; font-weight:700; color:var(--ink-soft); display:block; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.04em; }
  #quiniela-root .field{ margin-bottom:12px; }
  #quiniela-root .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; align-items:start; }
  #quiniela-root .row2 .field label{ min-height:2.6em; line-height:1.3; }
  #quiniela-root .match-edit-row{
    display:grid; grid-template-columns:1fr 1fr auto; gap:8px; align-items:end; margin-bottom:10px;
  }
  #quiniela-root .icon-x{ background:var(--red); color:#fff; border:none; border-radius:8px; width:36px; height:36px; }

  #quiniela-root .badge{ display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:700; padding:3px 9px; border-radius:999px; }
  #quiniela-root .badge.paid{ background:#DCEFE1; color:#1B4332; }
  #quiniela-root .badge.unpaid{ background:#F6E1DE; color:#7d251d; }
  #quiniela-root .badge.admin{ background:rgba(227,178,60,0.25); color:var(--gold-dim); }

  #quiniela-root .empty{
    text-align:center; padding:40px 20px; color:var(--ink-soft);
  }
  #quiniela-root .empty .display{ font-size:26px; color:var(--pitch-dark); }

  #quiniela-root .divider{ height:1px; background:var(--line); margin:16px 0; }
  #quiniela-root .toast{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:var(--pitch-dark); color:var(--chalk); padding:10px 18px; border-radius:999px;
    font-size:13px; font-weight:600; box-shadow:var(--shadow); z-index:100;
    opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease;
  }
  #quiniela-root .toast.show{ opacity:1; transform:translateX(-50%) translateY(-4px); }

  #quiniela-root .history-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 14px; border:1px solid var(--line); border-radius:10px; margin-bottom:8px; background:var(--paper);
  }
  #quiniela-root .history-item:hover{ border-color:var(--pitch-light); }

  #quiniela-root .section-title{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  #quiniela-root .section-title .display{ font-size:24px; }

  @media (max-width:480px){
    #quiniela-root .qz-brand .display{ font-size:24px; }
    #quiniela-root .name-grid{ grid-template-columns:repeat(auto-fit, minmax(130px, 1fr)); }
    #quiniela-root .clock-seg{ min-width:46px; padding:6px 8px; }
    #quiniela-root .clock-seg .num{ font-size:20px; }
  }
</style>

</head>

  const pathParts = window.location.pathname.split("/").filter(Boolean);
  let ROUTE = "root";
  let SLUG = null;
  if(pathParts.length === 0){ ROUTE = "root"; }
  else if(pathParts[0] === "q" && pathParts[1]){ ROUTE = "quiniela"; SLUG = decodeURIComponent(pathParts[1]); }
  else if(pathParts[0] === "crear"){ ROUTE = "crear"; }
  else if(pathParts[0] === "panel-plataforma"){ ROUTE = "platform"; }
  else { ROUTE = "unknown"; }

  function currentMetaKey(){ return SLUG ? ("quiniela:" + SLUG + ":meta") : "quiniela_meta_v1"; }
  function currentPicksKey(pid){ return SLUG ? ("quiniela:" + SLUG + ":picks:" + pid) : ("quiniela_picks_" + pid + "_v1"); }
  function metaKeyFor(slug){ return "quiniela:" + slug + ":meta"; }

  function slugify(str){
    return (str || "")
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // strip accents
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "")
      .slice(0, 40) || "quiniela";
  }

  function uid(prefix){ return prefix + "_" + Math.random().toString(36).slice(2,9); }

  // ---------- platform-level storage (list of all quinielas, jornada limit/pricing settings) ----------
  async function getPlatformIndex(){
    try{
      const creds = platformPasswordCache ? { platform: platformPasswordCache } : undefined;
      const r = await kvGet(PLATFORM_INDEX_KEY, creds);
      return r.found ? r.value : { quinielas: [] };
    }catch(e){ console.error("getPlatformIndex failed", e); return { quinielas: [] }; }
  }
  async function setPlatformIndex(idx){
    try{ return await kvSet(PLATFORM_INDEX_KEY, idx, { platform: platformPasswordCache }); }
    catch(e){ console.error("setPlatformIndex failed", e); return false; }
  }
  async function getPlatformSettings(){
    const defaults = { jornadaLimit: 5, pricePerParticipant: 10, depositInfo: "" };
    try{
      const r = await kvGet(PLATFORM_SETTINGS_KEY);
      return r.found ? { ...defaults, ...r.value } : defaults;
    }catch(e){ console.error("getPlatformSettings failed", e); return defaults; }
  }
  async function setPlatformSettings(s){
    try{ return await kvSet(PLATFORM_SETTINGS_KEY, s, { platform: platformPasswordCache }); }
    catch(e){ console.error("setPlatformSettings failed", e); return false; }
  }
  const PLATFORM_PAYMENTLOG_KEY = "platform_payment_log";
  async function getPlatformPaymentLog(){
    try{
      const creds = platformPasswordCache ? { platform: platformPasswordCache } : undefined;
      const r = await kvGet(PLATFORM_PAYMENTLOG_KEY, creds);
      return r.found ? r.value : { payments: [] };
    }catch(e){ console.error("getPlatformPaymentLog failed", e); return { payments: [] }; }
  }
  async function setPlatformPaymentLog(log){
    try{ return await kvSet(PLATFORM_PAYMENTLOG_KEY, log, { platform: platformPasswordCache }); }
    catch(e){ console.error("setPlatformPaymentLog failed", e); return false; }
  }
  // Self-service: anyone can register a brand-new quiniela in the platform index
  // (that's how /crear and "move to my own link" work) — no platform password needed,
  // it only ever adds one new entry, it can't touch or remove anyone else's.
  // Creating a brand-new quiniela — meta + platform_index entry — happens as a
  // single atomic operation on the server (see /api/create-quiniela). No
  // separate registration step, no window where one exists without the other.
  async function apiCreateQuiniela({ slug, groupName, creatorName, contact, password }){
    try{
      const res = await fetch("/api/create-quiniela", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ slug, groupName, creatorName, contact, password })
      });
      const data = await res.json().catch(() => ({}));
      return { ok: res.ok, ...data };
    }catch(e){ console.error("apiCreateQuiniela failed", e); return { ok: false }; }
  }
  // Moving a quiniela to its own link happens entirely on the server in one
  // transaction — the browser never touches the password hash or anyone's PIN,
  // and if anything fails partway through, nothing changes.
  async function apiMigrateQuiniela(toSlug){
    try{
      const res = await fetch("/api/migrate-quiniela", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Qracks-Auth": ownerPasswordCache || "" },
        body: JSON.stringify({ toSlug })
      });
      const data = await res.json().catch(() => ({}));
      return { ok: res.ok, ...data };
    }catch(e){ console.error("apiMigrateQuiniela failed", e); return { ok: false }; }
  }


  // IMPORTANT: kvGet distinguishes "genuinely doesn't exist yet" (404) from
  // "the request failed" (network/server error). Callers that decide whether
  // to initialize fresh data (boot()) must never treat an error as "not found" —
  // doing so would silently overwrite real data on a transient failure.
  async function kvGet(key, creds){
    const headers = {};
    if(creds && creds.owner) headers["X-Qracks-Auth"] = creds.owner;
    if(creds && creds.platform) headers["X-Qracks-Platform-Auth"] = creds.platform;
    const res = await fetch("/api/kv/" + encodeURIComponent(key), { headers, credentials: "same-origin" });
    if(res.status === 404) return { found: false };
    if(!res.ok) throw new Error("kv get failed: HTTP " + res.status);
    const data = await res.json();
    return { found: true, value: data.value };
  }
  async function kvSet(key, value, creds){
    const headers = { "Content-Type": "application/json" };
    if(creds && creds.owner) headers["X-Qracks-Auth"] = creds.owner;
    if(creds && creds.platform) headers["X-Qracks-Platform-Auth"] = creds.platform;
    const res = await fetch("/api/kv/" + encodeURIComponent(key), {
      method: "POST",
      headers,
      credentials: "same-origin",
      body: JSON.stringify({ value })
    });
    return res.ok;
  }
  async function kvDelete(key, creds){
    const headers = {};
    if(creds && creds.platform) headers["X-Qracks-Platform-Auth"] = creds.platform;
    const res = await fetch("/api/kv/" + encodeURIComponent(key), { method: "DELETE", headers });
    return res.ok;
  }
  // getMeta: returns the saved meta, or null if it genuinely doesn't exist yet.
  // Throws (does NOT return null) if the request itself failed — callers must
  // handle that separately and must not initialize fresh data in that case.
  async function getMeta(creds){
    const r = await kvGet(currentMetaKey(), creds);
    return r.found ? r.value : null;
  }
  // Cached in memory only (never persisted) once the admin/platform owner types
  // their password correctly — attached automatically to writes that need it, so
  // the server can verify each request instead of trusting the browser alone.
  let ownerPasswordCache = null;
  let platformPasswordCache = null;
  let currentUserPinCache = null;
  function adminOrOwnerCred(){
    return ownerPasswordCache || ((currentUser && currentUser.isAdmin) ? currentUserPinCache : null);
  }
  async function setMeta(meta, opts){
    try{
      const ownerCred = (opts && opts.owner) || adminOrOwnerCred();
      const creds = { owner: ownerCred, platform: platformPasswordCache };
      return await kvSet(currentMetaKey(), meta, creds);
    }catch(e){ console.error("save meta failed", e); return false; }
  }
  // Reads a participant's picks. Before that round's deadline, the server only
  // hands back the full picks to the participant themselves (their own PIN) or
  // an admin/owner — everyone else gets the closed-rounds-only view, so no one
  // can see in-progress predictions early. Pass `asAdmin: true` when loading
  // picks for people other than the current user (Tabla/Historial/Participación
  // only ever need closed-round data anyway, which the safe view already has).
  async function getPicks(pid, opts){
    try{
      const isOwnPicks = currentUser && pid === currentUser.id;
      const creds = { owner: isOwnPicks ? currentUserPinCache : ((opts && opts.asAdmin) ? adminOrOwnerCred() : null) };
      const r = await kvGet(currentPicksKey(pid), creds);
      return r.found ? r.value : {};
    }catch(e){ console.error("getPicks failed", e); return {}; }
  }
  async function setPicks(pid, data){
    try{
      const creds = { owner: currentUserPinCache };
      return await kvSet(currentPicksKey(pid), data, creds);
    }catch(e){ console.error("save picks failed", e); return false; }
  }
  async function verifyOwnerPassword(password){
    try{
      const res = await fetch("/api/verify-owner", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ metaKey: currentMetaKey(), password })
      });
      if(!res.ok) return false;
      const data = await res.json();
      return !!data.ok;
    }catch(e){ console.error("verifyOwnerPassword failed", e); return false; }
  }
  async function verifyPlatformPassword(password){
    try{
      const res = await fetch("/api/verify-platform", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password })
      });
      if(!res.ok) return false;
      const data = await res.json();
      return !!data.ok;
    }catch(e){ console.error("verifyPlatformPassword failed", e); return false; }
  }
  async function verifyParticipantPin(participantId, pin){
    try{
      const res = await fetch("/api/verify-pin", {
        method: "POST", headers: { "Content-Type": "application/json" }, credentials: "same-origin",
        body: JSON.stringify({ metaKey: currentMetaKey(), participantId, pin, slug: SLUG || "_root" })
      });
      if(!res.ok) return { ok: false };
      return await res.json();
    }catch(e){ console.error("verifyParticipantPin failed", e); return { ok: false }; }
  }
  async function apiSetPin(participantId, currentPin, newPin){
    try{
      const res = await fetch("/api/set-pin", {
        method: "POST", headers: { "Content-Type": "application/json" }, credentials: "same-origin",
        body: JSON.stringify({ metaKey: currentMetaKey(), participantId, currentPin, newPin, slug: SLUG || "_root" })
      });
      return res.ok;
    }catch(e){ console.error("apiSetPin failed", e); return false; }
  }
  // Anonymous, non-sensitive — just enough to tell "same device came back"
  // apart in the funnel numbers. Not the session cookie, no security role.
  function getDeviceId(){
    try{
      let id = window.localStorage.getItem("qracks_device_id");
      if(!id){
        id = "d_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
        window.localStorage.setItem("qracks_device_id", id);
      }
      return id;
    }catch(e){ return "d_unknown"; }
  }
  // Growth Loop funnel — fire-and-forget, never blocks the UI and never
  // throws into the caller if it fails.
  function trackEvent(event, extra){
    try{
      fetch("/api/track-event", {
        method: "POST", headers: { "Content-Type": "application/json" }, credentials: "same-origin",
        body: JSON.stringify({
          event,
          competitionSlug: SLUG || null,
          source: "access_link",
          deviceId: getDeviceId(),
          ...extra
        })
      }).catch(() => {});
    }catch(e){ /* analytics should never break the app */ }
  }
  // Access Link "remember this device": the actual token lives only in an
  // HttpOnly cookie the browser manages on its own — this just asks the server
  // "is there a still-valid one for this quiniela?" and gets back plain user
  // state, never the token itself.
  async function checkSession(){
    try{
      const res = await fetch("/api/verify-session", {
        method: "POST", headers: { "Content-Type": "application/json" }, credentials: "same-origin",
        body: JSON.stringify({ metaKey: currentMetaKey(), slug: SLUG || "_root" })
      });
      if(!res.ok) return null;
      const data = await res.json();
      return data.ok ? data : null;
    }catch(e){ console.error("checkSession failed", e); return null; }
  }
  async function clearSessionCookie(){
    try{
      await fetch("/api/clear-session", {
        method: "POST", headers: { "Content-Type": "application/json" }, credentials: "same-origin",
        body: JSON.stringify({ slug: SLUG || "_root" })
      });
    }catch(e){ console.error("clearSessionCookie failed", e); }
  }
  async function apiSelfRegister(name, pin){
    try{
      const res = await fetch("/api/self-register", {
        method: "POST", headers: { "Content-Type": "application/json" }, credentials: "same-origin",
        body: JSON.stringify({ metaKey: currentMetaKey(), name, pin, slug: SLUG || "_root" })
      });
      const data = await res.json().catch(() => ({}));
      return { ok: res.ok, ...data };
    }catch(e){ console.error("apiSelfRegister failed", e); return { ok: false }; }
  }

  // ---------- app state ----------
  let meta = null;

  function esc(s){
    return String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  // Appends an entry to the results audit trail (kept in meta so it travels with the quiniela).
  // Caller is responsible for calling setMeta() afterward to persist it.
  function logAudit(action, detail){
    if(!meta.auditLog) meta.auditLog = [];
    meta.auditLog.push({
      ts: new Date().toISOString(),
      admin: currentUser ? currentUser.name : "?",

  // Lets a text/password field submit on Enter, same as clicking its button.
  function enterSubmits(inputId, buttonId){
    const input = document.getElementById(inputId);
    const btn = document.getElementById(buttonId);

  // ---------- derived helpers ----------
  function isRoundLocked(round){
    if(!round) return true;
    return Date.now() > new Date(round.deadline).getTime();
  }
  function timeParts(deadline){
    let diff = new Date(deadline).getTime() - Date.now();
    if(diff < 0) diff = 0;
    const d = Math.floor(diff/86400000);
    const h = Math.floor((diff%86400000)/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    return {d,h,m,s};
  }

  // One request for everyone's picks instead of one request PER participant.
  // Same credential logic as before (own PIN for yourself, admin/owner cred
  // when acting as admin) — the server applies the identical per-participant
  // visibility rules either way, so callers see no difference at all.
  async function ensureAllPicksLoaded(){
    if(loadingAllPicks) return;
    loadingAllPicks = true;
    try{
      const isAdmin = !!(currentUser && currentUser.isAdmin);
      const cred = isAdmin ? adminOrOwnerCred() : currentUserPinCache;
      const headers = { "Content-Type": "application/json" };
      if(cred) headers["X-Qracks-Auth"] = cred;
      const res = await fetch("/api/picks-batch", {
        method: "POST", headers, credentials: "same-origin",
        body: JSON.stringify({ metaKey: currentMetaKey(), participantIds: meta.participants.map(p => p.id) })
      });
      allPicksCache = res.ok ? (await res.json()).picks || {} : {};
    }catch(e){
      console.error("ensureAllPicksLoaded (batch) failed", e);
      allPicksCache = {};
    }
    loadingAllPicks = false;
  }

  // ---------- casuísticas / apuestas personalizadas (motor genérico) ----------
  // Migrates the old single-purpose golScorerBet into the new flexible list, once.
  // Returns true if it changed meta (caller should persist with setMeta).
  function ensureCustomBets(){
    if(!meta.customBets) meta.customBets = [];
    if(meta.customBetsMigrated) return false;
    meta.customBetsMigrated = true;
    const old = meta.golScorerBet;
    if(old && old.enabled){
      const id = uid("cb");
      meta.customBets.push({
        id,
        label: "Goleador de la liga",
        scope: "temporada",
        points: old.bonusPoints != null ? old.bonusPoints : 3,
        closesAtRound: old.closesAtRound || null
      });
      meta.participants.forEach(p => {
        if(p.golScorerGuess){
          if(!p.customBetAnswers) p.customBetAnswers = {};
          p.customBetAnswers[id] = { guess: p.golScorerGuess, correct: p.golScorerCorrect === true };
        }
      });
      return true;
    }
    return true; // still mark migrated even if there was nothing to migrate
  }

  function customBetsLocked(bet){
    if(bet.scope !== "temporada" || !bet.closesAtRound) return false;
    const closingRound = meta.rounds.find(r => r.number === bet.closesAtRound);
    if(!closingRound) return false;
    return isRoundLocked(closingRound);
  }

  function customBetPointsFor(participantId){
    let pts = 0;
    if(!meta.customBets || !meta.customBets.length) return pts;
    const p = meta.participants.find(x => x.id === participantId);
    if(!p) return pts;
    meta.customBets.forEach(bet => {
      if(bet.scope === "temporada"){
        const ans = p.customBetAnswers && p.customBetAnswers[bet.id];
        if(ans && ans.correct === true) pts += bet.points;
      } else if(bet.scope === "jornada"){
        meta.rounds.forEach(r => {
          const res = r.customBetResults && r.customBetResults[bet.id];
          if(res && res[participantId] === true) pts += bet.points;
        });
      }
    });
    return pts;
  }

  function pointsFor(participantId){
    const picks = allPicksCache[participantId] || {};
    const perPick = (meta.settings && meta.settings.pointsPerCorrectPick != null) ? meta.settings.pointsPerCorrectPick : 1;
    let pts = 0, played = 0;
    meta.rounds.forEach(r => {
      if(!r.resultsPublished) return;
      r.matches.forEach(m => {
        const result = r.results ? r.results[m.id] : null;
        if(!result) return;
        played++;
        const pick = picks[r.id] ? picks[r.id][m.id] : null;
        if(pick && pick === result) pts += perPick;
      });
    });
    const p = meta.participants.find(x => x.id === participantId);
    pts += customBetPointsFor(participantId);
    const penalty = meta.paymentPenalty;
    if(penalty && penalty.enabled && penalty.startsAtRound && p && !p.paid){
      const passedRounds = meta.rounds.filter(r => r.resultsPublished && r.number >= penalty.startsAtRound).length;
      const perRound = penalty.pointsPerRound != null ? penalty.pointsPerRound : 1;
      pts -= passedRounds * perRound;
    }
    return {pts, played};
  }

  function penaltyFor(participantId){
    const penalty = meta.paymentPenalty;
    const p = meta.participants.find(x => x.id === participantId);
    if(!penalty || !penalty.enabled || !penalty.startsAtRound || !p || p.paid) return 0;
    const passedRounds = meta.rounds.filter(r => r.resultsPublished && r.number >= penalty.startsAtRound).length;
    const perRound = penalty.pointsPerRound != null ? penalty.pointsPerRound : 1;
    return passedRounds * perRound;
  }

  function standingsList(){
    return meta.participants.map(p => {
      const {pts} = pointsFor(p.id);
      return {...p, pts, penalty: penaltyFor(p.id)};
    }).sort((a,b) => b.pts - a.pts);
  }

  // Dense ranking: participants tied on points share the same position, and the
  // next distinct point value takes the very next position (no skipped numbers).
  // Assumes `list` is already sorted by points descending.
  function computeDenseRanks(list){
    const ranks = new Array(list.length);
    let currentRank = 0;
    let lastPts;
    list.forEach((p, i) => {
      if(i === 0 || p.pts !== lastPts){
        currentRank++;
        lastPts = p.pts;
      }
      ranks[i] = currentRank;
    });
    return ranks;
  }

  function previousRanks(){
    const published = meta.rounds.filter(r => r.resultsPublished).sort((a,b)=>a.number-b.number);
    if(published.length < 1) return null;
    const lastId = published[published.length-1].id;
    const perPick = (meta.settings && meta.settings.pointsPerCorrectPick != null) ? meta.settings.pointsPerCorrectPick : 1;
    const prev = meta.participants.map(p => {
      const picks = allPicksCache[p.id] || {};
      let pts = 0;
      published.forEach(r => {
        if(r.id === lastId) return;
        r.matches.forEach(m => {
          const result = r.results[m.id];
          if(!result) return;
          const pick = picks[r.id] ? picks[r.id][m.id] : null;
          if(pick && pick === result) pts += perPick;
        });
      });
      return { id: p.id, pts };
    }).sort((a,b) => b.pts - a.pts);
    const denseRanks = computeDenseRanks(prev);
    const ranks = {};
    prev.forEach((p,i) => { ranks[p.id] = denseRanks[i]; });
    return ranks;
  }

  // ---------- render root ----------
  let sessionCheckDone = false;
  let accessLinkOpenedTracked = false;

  async function render(){

  function renderLogin(){
    const sortedParticipants = meta.participants.slice().sort((a,b) => a.name.localeCompare(b.name, "es", {sensitivity:"base"}));
    const names = sortedParticipants.map(p => `

    root.innerHTML = `

          <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:6px;"><img src="${QRACKS_ICON_SRC}" alt="" style="width:16px;height:16px;border-radius:4px;"><span style="font-weight:800;font-size:12px;letter-spacing:0.1em;color:var(--gold-dim);">QRACKS</span></div>

          <p class="muted" style="text-align:center;margin-top:14px;">🔒 = ya tiene PIN configurado. Si es tu nombre y no tiene candado, tócalo y ponle un PIN antes que alguien más lo haga.</p>
          <p class="muted" style="text-align:center;margin-top:8px;">¿Quieres tu propia quiniela? <a href="/crear" style="color:var(--pitch-light);font-weight:700;">Créala aquí</a></p>
        </div>
      </div>
    `;
    document.getElementById("qz-self-register").addEventListener("click", async () => {
      trackEvent("join_started", { isNewUser: true });
      const newName = window.prompt("¿Cuál es tu nombre?");
      if(newName === null) return;
      const cleanName = newName.trim();
      if(!cleanName){ toast("Escribe un nombre válido"); return; }
      if(meta.participants.some(p => p.name.toLowerCase() === cleanName.toLowerCase())){
        toast("Ya existe alguien con ese nombre — búscalo en la lista de arriba en vez de crear otro.");
        return;
      }
      const newPin = window.prompt("Ponle un PIN de 4 dígitos para proteger tu nombre:");
      if(newPin === null) return;
      const cleanPin = newPin.trim();
      if(!/^\d{4}$/.test(cleanPin)){ toast("El PIN debe ser exactamente 4 números"); return; }
      const result = await apiSelfRegister(cleanName, cleanPin);
      if(!result.ok){
        toast(result.error === "name_taken" ? "Ya existe alguien con ese nombre — búscalo en la lista de arriba." : "No se pudo guardar, intenta de nuevo");

      toast("¡Bienvenido, " + cleanName + "! ✅");
      const newParticipant = { ...result.participant };
      trackEvent("join_completed", { participantId: newParticipant.id, isNewUser: true });
      meta.participants.push(newParticipant);
      currentUser = newParticipant;
      currentUserPinCache = cleanPin;
      myPicks = await getPicks(newParticipant.id);
      activeTab = "jornada";
      render();

    root.querySelectorAll(".name-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        const p = meta.participants.find(x => x.id === btn.dataset.id);
        if(!p.hasPin){
          const newPin = window.prompt("Este nombre todavía no tiene PIN. Ponle uno de 4 dígitos para que nadie más pueda entrar como tú:");
          if(newPin === null) return;
          const cleanPin = newPin.trim();
          if(!/^\d{4}$/.test(cleanPin)){ toast("El PIN debe ser exactamente 4 números"); return; }
          const ok = await apiSetPin(p.id, null, cleanPin);
          if(!ok){ toast("No se pudo guardar el PIN, intenta de nuevo"); return; }
          p.hasPin = true;
          currentUserPinCache = cleanPin;
          toast("PIN configurado ✅ — no lo olvides");

        currentUser = p;
        myPicks = await getPicks(p.id);
        activeTab = "jornada";
        render();
      });
    });

  function tabList(){
    const tabs = [
      {id:"jornada", label:"Jornada"},
      {id:"tabla", label:"Tabla"},
      {id:"historial", label:"Historial"},
    ];
    if(currentUser.isAdmin) tabs.push({id:"admin", label:"Admin"});
    return tabs;
  }

  function pendingPicksInfo(){
    const openRounds = meta.rounds.filter(r => classifyRound(r) === "porjugar");
    for(const r of openRounds){
      const picks = myPicks[r.id] || {};
      const missing = r.matches.filter(m => !picks[m.id]).length;
      if(missing > 0) return { round: r, missing, total: r.matches.length };
    }
    return null;
  }

  function currentRoundContext(){
    const open = meta.rounds.filter(r => classifyRound(r) === "porjugar").sort((a,b)=>a.number-b.number);
    if(open.length) return open[0];
    const enVivo = meta.rounds.filter(r => classifyRound(r) === "envivo").sort((a,b)=>b.number-a.number);
    if(enVivo.length) return enVivo[0];
    const played = meta.rounds.filter(r => r.resultsPublished).sort((a,b)=>b.number-a.number);
    return played.length ? played[0] : null;
  }

  let userMenuOpen = false;

        </div>
      </div>
      <div class="qz-main" id="qz-main"></div>
    `;
    document.getElementById("qz-user-toggle").addEventListener("click", (e) => {
      e.stopPropagation();
      userMenuOpen = !userMenuOpen;

    if(headerCopyBtn) headerCopyBtn.addEventListener("click", copyAccessLink);

    if(menuCopyBtn) menuCopyBtn.addEventListener("click", copyAccessLink);

      ownerPasswordCache = null;
      currentUserPinCache = null;
      sessionCheckDone = false;
      adminMetaRefreshed = false;
      render();
    });
    document.getElementById("qz-change-pin").addEventListener("click", async () => {
      if(currentUser.hasPin){
        const current = window.prompt("Escribe tu PIN actual:");
        if(current === null) return;
        const verification = await verifyParticipantPin(currentUser.id, current.trim());
        if(!verification.ok){ toast("PIN actual incorrecto"); return; }
      }
      const newPin = window.prompt("Escribe tu nuevo PIN (4 dígitos):");
      if(newPin === null) return;
      const cleanPin = newPin.trim();
      if(!/^\d{4}$/.test(cleanPin)){ toast("El PIN debe ser exactamente 4 números"); return; }
      const ok = await apiSetPin(currentUser.id, currentUserPinCache, cleanPin);
      if(!ok){ toast("No se pudo cambiar el PIN, intenta de nuevo"); return; }
      currentUser.hasPin = true;
      currentUserPinCache = cleanPin;
      toast("✅ Listo, tu PIN quedó actualizado.");
    });
    root.querySelectorAll(".qz-tab").forEach(btn => {
      btn.addEventListener("click", () => {
        activeTab = btn.dataset.tab;
        render();
      });
    });
    const main = document.getElementById("qz-main");
    if(activeTab === "jornada") renderJornada(main);
    else if(activeTab === "tabla") renderTabla(main);
    else if(activeTab === "historial") renderHistorial(main);
    else if(activeTab === "admin") renderAdmin(main);
  }

  // ---------- JORNADA (voting, filtered like Por jugar / En vivo / Jugados) ----------
  let clockInterval = null;

  function classifyRound(round){
    if(round.resultsPublished) return "jugados";
    if(isRoundLocked(round)) return "envivo";
    return "porjugar";
  }

  async function renderJornada(main){
    if(clockInterval){ clearInterval(clockInterval); clockInterval = null; }

    const counts = {porjugar:0, envivo:0, jugados:0};
    meta.rounds.forEach(r => counts[classifyRound(r)]++);
    const filters = [
      {id:"porjugar", label:"Por jugar"},
      {id:"envivo", label:"En vivo"},
      {id:"jugados", label:"Jugados"},
    ];

    const pending = pendingPicksInfo();
    const migratedBets = ensureCustomBets();
    if(migratedBets) await setMeta(meta);
    const temporadaBets = (meta.customBets || []).filter(b => b.scope === "temporada");
    const penalty = meta.paymentPenalty;
    const showPaymentNote = penalty && penalty.enabled && penalty.startsAtRound && !currentUser.paid;
    const heroRound = jornadaFilter === "porjugar" ? meta.rounds.filter(r => classifyRound(r) === "porjugar").sort((a,b)=>a.number-b.number)[0] : null;
    const aloneAsAdmin = currentUser.isAdmin && meta.participants.length <= 1;
    // Only real match picks count as "has predicted before" — jornada-scope custom
    // bet answers live under __extra in the same object and don't count.
    const hasEverPicked = Object.values(myPicks || {}).some(roundPicks =>
      Object.keys(roundPicks || {}).some(k => k !== "__extra")
    );
    main.innerHTML = `
      ${screenHeaderHtml("jornada", "Jornada")}
      ${aloneAsAdmin ? `
        <div class="card" style="border-color:var(--gold);background:#FFF9EC;margin-bottom:14px;">
          <div class="eyebrow" style="color:var(--gold-dim);">👋 Todavía eres el único aquí</div>
          <p style="margin:4px 0 12px;">Comparte el link para que se unan tus amigos — sin ellos, no hay quiniela.</p>
          <button class="btn btn-gold btn-sm" id="qz-invite-participants">Invitar participantes</button>
        </div>
      ` : ``}
      ${heroRound ? `
        <div class="card-primary" style="text-align:center;">
          <div class="eyebrow" style="justify-content:center;display:flex;">🔥 Jornada ${heroRound.number}</div>
          ${!hasEverPicked ? `<p class="muted" style="margin:0 0 4px;">Aquí eliges quién gana cada partido.</p>` : ``}
          <div class="mono" id="qz-hero-clock" style="font-size:30px;margin:6px 0 10px;color:var(--pitch-dark);">⏰ ${esc(shortCountdown(heroRound.deadline))}</div>
          ${pending && pending.round.id === heroRound.id
            ? `<p style="margin:0 0 16px;">Te faltan <strong>${pending.missing}</strong> de ${pending.total} partidos.</p>`
            : `<p style="margin:0 0 16px;color:var(--pitch-light);font-weight:700;">✅ Ya registraste todos tus pronósticos.</p>`}
          <button class="btn btn-primary" id="qz-hero-continue" style="width:100%;padding:14px;font-size:16px;">${!hasEverPicked ? "Hacer mi primera predicción" : "Continuar"}</button>
        </div>
      ` : ``}
      <div id="qz-pending-banner">${pending ? `
        <div class="card" style="border-color:var(--gold);background:#FFF9EC;margin-bottom:14px;">
          <div class="eyebrow" style="color:var(--gold-dim);">⚠️ Te faltan votos</div>
          <p style="margin:4px 0 0;">Te faltan <strong id="qz-pending-count">${pending.missing} de ${pending.total}</strong> partidos en la Jornada ${pending.round.number}.</p>
        </div>
      ` : ``}</div>
      ${showPaymentNote ? `
        <div class="card" style="border-color:var(--red);background:#F6E1DE;margin-bottom:14px;">
          <div class="eyebrow" style="color:#7d251d;">💰 Falta tu pago</div>
          <p style="margin:4px 0 0;">Si no pagas tu cuota, se te van a restar <strong>${penalty.pointsPerRound != null ? penalty.pointsPerRound : 1} punto${(penalty.pointsPerRound===1)?'':'s'}</strong> por cada jornada a partir de la <strong>Jornada ${penalty.startsAtRound}</strong>, hasta que el admin haya recibido tu pago.</p>
        </div>
      ` : ``}
      ${temporadaBets.map(bet => {
        const locked = customBetsLocked(bet);
        const myGuess = (currentUser.customBetAnswers && currentUser.customBetAnswers[bet.id]) ? currentUser.customBetAnswers[bet.id].guess : "";
        return `
        <div class="card" style="margin-bottom:14px;">
          <div class="eyebrow">🎯 ${esc(bet.label)} (+${bet.points} pts si le atinas)</div>
          <p class="muted" style="margin-top:-4px;">${locked ? "Ya cerró — no se puede cambiar." : (bet.closesAtRound ? `Se elige a más tardar antes de que inicie la Jornada ${bet.closesAtRound}.` : "Escribe tu apuesta.")}</p>
          <div class="row2">
            <input type="text" id="qz-cb-input-${bet.id}" placeholder="Escribe tu respuesta" value="${esc(myGuess)}" ${locked ? "disabled" : ""}>
            ${locked ? "" : `<button class="btn btn-gold" data-cb-save="${bet.id}">Guardar</button>`}
          </div>
        </div>
      `;
      }).join("")}
      <div class="qz-tabs" style="margin-bottom:14px;">
        ${filters.map(f => `<button class="qz-tab" data-jf="${f.id}" style="color:${f.id===jornadaFilter?'var(--pitch-dark)':'var(--ink-soft)'};border-bottom-color:${f.id===jornadaFilter?'var(--gold)':'transparent'};">${f.label} ${counts[f.id]?`· ${counts[f.id]}`:''}</button>`).join("")}
      </div>
      <div id="qz-jornada-list"></div>
    `;
    wireScreenHeader(main, "jornada");
    const inviteBtn = document.getElementById("qz-invite-participants");
    if(inviteBtn) inviteBtn.addEventListener("click", copyAccessLink);
    const heroContinueBtn = document.getElementById("qz-hero-continue");
    if(heroContinueBtn){
      heroContinueBtn.addEventListener("click", () => {
        document.getElementById("qz-jornada-list").scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }
    root.querySelectorAll("[data-cb-save]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const betId = btn.dataset.cbSave;
        const val = document.getElementById("qz-cb-input-" + betId).value.trim();
        if(!val){ toast("Escribe una respuesta"); return; }
        if(!currentUser.customBetAnswers) currentUser.customBetAnswers = {};
        const prev = currentUser.customBetAnswers[betId];
        currentUser.customBetAnswers[betId] = { guess: val, correct: prev ? prev.correct : null };
        const ok = await setMeta(meta);
        toast(ok ? "✅ Listo, tu respuesta quedó guardada." : "No se pudo guardar, intenta de nuevo");
      });
    });
    root.querySelectorAll("[data-jf]").forEach(btn => {
      btn.addEventListener("click", () => { jornadaFilter = btn.dataset.jf; renderJornada(main); });
    });

    const list = document.getElementById("qz-jornada-list");
    const rounds = meta.rounds.filter(r => classifyRound(r) === jornadaFilter).slice().sort((a,b)=>a.number-b.number);

    if(!rounds.length){
      const emptyMsg = {
        porjugar: "No hay jornadas abiertas para votar ahora. Vuelve cuando el admin publique una nueva.",
        envivo: "No hay jornadas cerradas esperando resultado. En cuanto cierre una, aparecerá aquí.",
        jugados: "Todavía no hay jornadas con resultados publicados. Aparecerán aquí en cuanto el admin los capture."
      }[jornadaFilter];
      list.innerHTML = `<div class="card empty"><div class="display">Nada por aquí</div><p class="muted">${emptyMsg}</p></div>`;
      return;
    }

    // "En vivo" reveals everyone's picks (fair game — the deadline already passed for these)
    if(jornadaFilter === "envivo"){
      list.innerHTML = `<div class="card"><p class="muted">Cargando picks de todos…</p></div>`;
      await ensureAllPicksLoaded();
    }

    list.innerHTML = rounds.map(r => `<div class="card" id="qz-round-${r.id}" style="padding:16px;"></div>`).join("");

    rounds.forEach(round => {
      const box = document.getElementById("qz-round-" + round.id);
      if(jornadaFilter === "porjugar") renderRoundVoting(box, round);
      else if(jornadaFilter === "envivo") renderRoundLocked(box, round);
      else renderRoundPlayed(box, round);
    });

    if(jornadaFilter === "porjugar"){
      clockInterval = setInterval(() => {
        rounds.forEach(round => {
          if(isRoundLocked(round)){ renderJornada(main); return; }
          const el = document.getElementById("qz-clockbody-" + round.id);
          if(el) el.innerHTML = clockDigitsHtml(round.deadline);
        });
        if(heroRound && !isRoundLocked(heroRound)){
          const heroEl = document.getElementById("qz-hero-clock");
          if(heroEl) heroEl.textContent = "⏰ " + shortCountdown(heroRound.deadline);
        }
      }, 1000);
    }
  }

  function shortCountdown(deadline){
    const {d,h,m,s} = timeParts(deadline);
    const clock = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return d > 0 ? `${d}d ${clock}` : clock;
  }

  function clockDigitsHtml(deadline){
    const {d,h,m,s} = timeParts(deadline);
    return `
      <div class="clock-digits">
        <div class="clock-seg"><span class="num mono">${String(d).padStart(2,'0')}</span><span class="unit">días</span></div>
        <div class="clock-seg"><span class="num mono">${String(h).padStart(2,'0')}</span><span class="unit">hrs</span></div>
        <div class="clock-seg"><span class="num mono">${String(m).padStart(2,'0')}</span><span class="unit">min</span></div>
        <div class="clock-seg"><span class="num mono">${String(s).padStart(2,'0')}</span><span class="unit">seg</span></div>
      </div>
    `;
  }

  function matchTeamsHtml(m){
    return `
      <div class="match-teams">
        <span class="match-team left">${esc(m.teamA)}</span>
        <span class="match-vs">VS</span>
        <span class="match-team right">${esc(m.teamB)}</span>
      </div>
    `;
  }

  // "Por jugar": open for voting, live countdown
  function renderRoundVoting(box, round){
    const roundPicks = myPicks[round.id] || {};
    const jornadaBets = (meta.customBets || []).filter(b => b.scope === "jornada");
    box.innerHTML = `
      <div class="clock-card" style="margin-bottom:14px;">
        <div class="clock-label">Jornada ${round.number} · cierre de quiniela</div>
        <div id="qz-clockbody-${round.id}">${clockDigitsHtml(round.deadline)}</div>
      </div>
      <div id="qz-matches-${round.id}"></div>
      <p class="muted" id="qz-savestatus-${round.id}" style="text-align:center;">Tus picks se guardan solos apenas los eliges.</p>
      <button class="btn btn-primary" data-save="${round.id}" style="width:100%;padding:14px;font-size:15px;">Guardar mis picks</button>
      ${jornadaBets.length ? `
        <div class="card" style="margin-top:14px;">
          <div class="eyebrow">🎯 Preguntas de esta jornada</div>
          ${jornadaBets.map(bet => {
            const extra = roundPicks.__extra || {};
            return `
              <div class="field">
                <label>${esc(bet.label)} (+${bet.points} pts)</label>
                <input type="text" data-cb-jornada="${bet.id}" placeholder="Escribe tu respuesta" value="${esc(extra[bet.id] || '')}">
              </div>
            `;
          }).join("")}
          <button class="btn btn-gold" id="qz-cb-jornada-save-${round.id}" style="width:100%;padding:10px;">Guardar respuestas</button>
          <p class="muted" id="qz-cb-jornada-status-${round.id}" style="text-align:center;margin-top:6px;"></p>
        </div>
      ` : ``}
    `;
    const matchesDiv = document.getElementById("qz-matches-" + round.id);
    const statusEl = document.getElementById("qz-savestatus-" + round.id);
    matchesDiv.innerHTML = round.matches.map(m => {
      const pick = roundPicks[m.id];
      return `
        <div class="match-card">
          ${matchTeamsHtml(m)}
          <div class="pick-row" data-match="${m.id}">
            <button class="pick-btn ${pick==='A'?'selected':''}" data-val="A">${esc(m.teamA)}</button>
            <button class="pick-btn ${pick==='D'?'selected':''}" data-val="D">Empate</button>
            <button class="pick-btn ${pick==='B'?'selected':''}" data-val="B">${esc(m.teamB)}</button>
          </div>
        </div>
      `;
    }).join("");
    const jornadaSaveBtn = document.getElementById("qz-cb-jornada-save-" + round.id);
    if(jornadaSaveBtn){
      jornadaSaveBtn.addEventListener("click", async () => {
        if(isRoundLocked(round)){ toast("Se cerró la quiniela justo ahora ⏱️"); renderJornada(document.getElementById("qz-main")); return; }
        if(!myPicks[round.id]) myPicks[round.id] = {};
        if(!myPicks[round.id].__extra) myPicks[round.id].__extra = {};
        box.querySelectorAll("[data-cb-jornada]").forEach(inp => {
          myPicks[round.id].__extra[inp.dataset.cbJornada] = inp.value.trim();
        });
        const stEl = document.getElementById("qz-cb-jornada-status-" + round.id);
        stEl.textContent = "Guardando…";
        const ok = await setPicks(currentUser.id, myPicks);
        stEl.textContent = ok ? "✅ Guardado" : "❌ No se pudo guardar";
        stEl.style.color = ok ? "var(--pitch-light)" : "var(--red)";
      });
    }
    matchesDiv.querySelectorAll(".pick-row").forEach(row => {
      row.querySelectorAll(".pick-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          if(isRoundLocked(round)){ toast("Se cerró la quiniela justo ahora ⏱️"); renderJornada(document.getElementById("qz-main")); return; }
          const matchId = row.dataset.match;
          if(!myPicks[round.id]) myPicks[round.id] = {};
          myPicks[round.id][matchId] = btn.dataset.val;
          row.querySelectorAll(".pick-btn").forEach(b => b.classList.toggle("selected", b===btn));
          statusEl.textContent = "Guardando…";
          const ok = await setPicks(currentUser.id, myPicks);
          statusEl.textContent = ok ? "✅ Guardado" : "❌ No se pudo guardar — revisa tu conexión e inténtalo de nuevo";
          statusEl.style.color = ok ? "var(--pitch-light)" : "var(--red)";
          if(ok){
            const stillPending = pendingPicksInfo();
            if(!stillPending){
              // Just finished the last pending pick anywhere — clear the banner and the tab dot.
              const bannerWrap = document.getElementById("qz-pending-banner");
              if(bannerWrap) bannerWrap.innerHTML = "";
              const dot = document.querySelector('.qz-tabs .qz-tab .qz-dot');
              if(dot) dot.remove();
            } else if(stillPending.round.id === round.id){
              // Same round — update the count in place without a full re-render.
              const countEl = document.getElementById("qz-pending-count");
              if(countEl) countEl.textContent = stillPending.missing + " de " + stillPending.total;
            }
          }
        });
      });
    });
    box.querySelector("[data-save]").addEventListener("click", async () => {
      if(isRoundLocked(round)){ toast("Se cerró la quiniela justo ahora ⏱️"); renderJornada(document.getElementById("qz-main")); return; }
      const ok = await setPicks(currentUser.id, myPicks);
      toast(ok ? "✅ Listo, tus pronósticos quedaron guardados." : "No se pudo guardar, intenta de nuevo");
    });
  }

  // "En vivo": locked, waiting for admin to publish results
  function renderRoundLocked(box, round){
    const roundPicks = myPicks[round.id] || {};
    const pickLabel = (val, m) => val==='A' ? m.teamA : val==='B' ? m.teamB : val==='D' ? 'Empate' : '—';
    box.innerHTML = `
      <div class="eyebrow" style="display:flex;justify-content:space-between;align-items:center;">
        <span>Jornada ${round.number}</span>
        <span class="badge unpaid">🔒 Cerrada, esperando resultado</span>
      </div>
      ${round.matches.map(m => {
        const pick = roundPicks[m.id];
        return `
          <div class="match-card">
            ${matchTeamsHtml(m)}
            <div class="pick-row">
              <button class="pick-btn ${pick==='A'?'selected':''}" disabled>${esc(m.teamA)}</button>
              <button class="pick-btn ${pick==='D'?'selected':''}" disabled>Empate</button>
              <button class="pick-btn ${pick==='B'?'selected':''}" disabled>${esc(m.teamB)}</button>
            </div>
            ${!pick ? `<div class="result-tag" style="color:var(--red);">No guardaste un pick — 0 pts en este partido</div>` : ``}
          </div>
        `;
      }).join("")}
      <div class="divider"></div>
      <div class="eyebrow">Lo que votó todo el mundo</div>
      <p class="muted" style="margin-top:-4px;">Ya se cerró la jornada, así que no hay ventaja en verlo — solo para tus cálculos.</p>
      <div style="overflow-x:auto;">
        <table>
          <thead><tr><th>Participante</th>${round.matches.map(m=>`<th style="text-align:center;">${esc(m.teamA)}<br>vs ${esc(m.teamB)}</th>`).join("")}</tr></thead>
          <tbody>
            ${meta.participants.slice().sort((a,b) => a.name.localeCompare(b.name, "es", {sensitivity:"base"})).map(p => {
              const picks = (allPicksCache[p.id] || {})[round.id] || {};
              return `<tr class="${p.id===currentUser.id?'me':''}"><td>${esc(p.name)}</td>${round.matches.map(m => `<td style="text-align:center;">${esc(pickLabel(picks[m.id], m))}</td>`).join("")}</tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>
    `;
  }

  // "Jugados": results known, show correct/wrong
  function renderRoundPlayed(box, round){
    const roundPicks = myPicks[round.id] || {};
    let correct = 0, total = 0;
    const matchesHtml = round.matches.map(m => {
      const pick = roundPicks[m.id];
      const result = round.results[m.id];
      if(result) total++;
      const gotIt = pick && result && pick === result;
      if(gotIt) correct++;
      const cls = (val) => pick !== val ? '' : (gotIt ? 'correct' : 'wrong');
      return `
        <div class="match-card">
          ${matchTeamsHtml(m)}
          <div class="pick-row">
            <button class="pick-btn ${cls('A')}" disabled>${esc(m.teamA)}</button>
            <button class="pick-btn ${cls('D')}" disabled>Empate</button>
            <button class="pick-btn ${cls('B')}" disabled>${esc(m.teamB)}</button>
          </div>
          <div class="result-tag">Resultado: ${result==='A'?esc(m.teamA):result==='B'?esc(m.teamB):'Empate'} ${gotIt ? '· acertaste ✅' : (pick ? '· fallaste ❌' : '· no participaste')}</div>
        </div>
      `;
    }).join("");
    box.innerHTML = `
      <div class="eyebrow" style="display:flex;justify-content:space-between;align-items:center;">
        <span>Jornada ${round.number}</span>
        <span class="badge paid">${correct}/${total} aciertos</span>
      </div>
      ${matchesHtml}
    `;
  }

  // ---------- TABLA (standings) ----------
  async function renderTabla(main){
    main.innerHTML = `<div class="card"><p class="muted">Calculando posiciones…</p></div>`;
    await ensureAllPicksLoaded();
    const list = standingsList();
    const ranks = computeDenseRanks(list);
    const prevRanks = previousRanks();
    const leaderPts = list.length ? list[0].pts : 0;
    const medal = (rank) => rank===1 ? "🥇" : rank===2 ? "🥈" : rank===3 ? "🥉" : null;
    function movementHtml(p, rank){
      if(!prevRanks || prevRanks[p.id] == null) return `<span class="muted">–</span>`;
      const prev = prevRanks[p.id];
      if(prev === rank) return `<span class="muted">–</span>`;
      if(prev > rank) return `<span style="color:var(--pitch-light);font-weight:700;">▲${prev - rank}</span>`;
      return `<span style="color:var(--red);font-weight:700;">▼${rank - prev}</span>`;
    }
    const fee = meta.settings.entryFee;
    const paidCount = meta.participants.filter(p=>p.paid).length;
    const totalP = meta.participants.length;
    const hasScoredResults = meta.rounds.some(r => r.resultsPublished);
    main.innerHTML = `
      ${screenHeaderHtml("tabla", "Tabla de posiciones", `
        <button class="btn btn-gold btn-sm" id="qz-share-card">📸 Imagen de la tabla</button>
        <button class="btn btn-ghost btn-sm" id="qz-export">⬇ Excel</button>
      `)}
      <div class="card">
        <div class="row2">
          <div><div class="eyebrow">Cuota por persona</div><div class="display" style="font-size:26px;">$${fee}</div></div>
          <div><div class="eyebrow">Recaudado</div><div class="display" style="font-size:26px;">$${paidCount*fee} <span class="muted" style="font-family:'Manrope';font-size:13px;">de $${totalP*fee}</span></div></div>
        </div>
      </div>
      ${!hasScoredResults ? `
        <div class="card empty">
          <div class="display">Aún no hay resultados</div>
          <p class="muted">La tabla se llena en cuanto el admin capture el resultado de la primera jornada.</p>
        </div>
      ` : `
      <div class="card" style="padding:8px 12px;">
        <table>
          <thead><tr><th style="text-align:center;">#</th><th></th><th>Participante</th><th style="text-align:center;">Pts</th><th style="text-align:center;">vs líder</th><th style="text-align:center;">Pagó</th></tr></thead>
          <tbody>
            ${list.map((p,i) => `
              <tr class="${p.id===currentUser.id?'me':''}">
                <td class="pos ${ranks[i]===1?'top1':''}" style="text-align:center;">${medal(ranks[i]) || ranks[i]}</td>
                <td style="text-align:center;">${movementHtml(p, ranks[i])}</td>
                <td>${esc(p.name)} ${p.isAdmin?'<span class="badge admin">ADMIN</span>':''} ${p.penalty > 0 ? `<span class="badge unpaid" title="Penalización por no pagar">−${p.penalty} por no pagar</span>` : ''}</td>
                <td style="text-align:center;font-weight:700;">${p.pts}</td>
                <td style="text-align:center;" class="muted">${i===0 ? "líder" : "−" + (leaderPts - p.pts)}</td>
                <td style="text-align:center;">${p.paid ? '<span class="badge paid">✅</span>' : '<span class="badge unpaid">❌</span>'}</td>

  function drawResultsCardCanvas(list){
    const shown = list; // show everyone, not just a cut-off top
    const width = 800;
    const rowH = 58;
    const headerH = 210;
    const footerH = 60;
    const height = headerH + shown.length * rowH + footerH;
    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext("2d");
    const F = "'Manrope', Arial, sans-serif";

    const grad = ctx.createLinearGradient(0, 0, 0, height);
    grad.addColorStop(0, "#0F2E22");
    grad.addColorStop(1, "#173A2B");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);

    ctx.fillStyle = "#D6A73C";
    ctx.fillRect(0, 0, width, 6);

    ctx.textAlign = "center";
    ctx.fillStyle = "#D6A73C";
    ctx.font = `800 18px ${F}`;
    ctx.fillText("QRACKS", width / 2, 46);

    const context = currentRoundContext();
    ctx.fillStyle = "#F7F5EC";
    ctx.font = `800 34px ${F}`;
    ctx.fillText(meta.groupName, width / 2, 90, width - 80);
    ctx.fillStyle = "rgba(247,245,236,0.75)";
    ctx.font = `600 17px ${F}`;
    ctx.fillText("TABLA DE POSICIONES" + (context ? " · JORNADA " + context.number : ""), width / 2, 120);

    ctx.strokeStyle = "rgba(214,167,60,0.4)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(60, 150);
    ctx.lineTo(width - 60, 150);
    ctx.stroke();

    const ranks = computeDenseRanks(shown);
    const medalColor = (rank) => rank===1 ? "#D6A73C" : rank===2 ? "#C9CDD3" : rank===3 ? "#B9784A" : null;

    shown.forEach((p, i) => {
      const rank = ranks[i];
      const rowY = headerH + i * rowH;
      if(i % 2 === 0){
        ctx.fillStyle = "rgba(255,255,255,0.035)";
        ctx.fillRect(40, rowY, width - 80, rowH);
      }
      const textY = rowY + rowH / 2 + 8;
      const mColor = medalColor(rank);
      if(mColor){
        ctx.beginPath();
        ctx.arc(76, rowY + rowH / 2, 17, 0, Math.PI * 2);
        ctx.fillStyle = mColor;
        ctx.fill();
        ctx.fillStyle = "#0F2E22";
        ctx.font = `800 16px ${F}`;
        ctx.textAlign = "center";
        ctx.fillText(String(rank), 76, rowY + rowH / 2 + 5);
      } else {
        ctx.fillStyle = "rgba(247,245,236,0.55)";
        ctx.font = `700 18px ${F}`;
        ctx.textAlign = "center";
        ctx.fillText(String(rank), 76, textY - 1);
      }
      ctx.textAlign = "left";
      ctx.fillStyle = mColor ? mColor : "#F7F5EC";
      ctx.font = `800 24px ${F}`;
      ctx.fillText(p.name, 105, textY, width - 260);
      ctx.textAlign = "right";
      ctx.fillStyle = "#F7F5EC";
      ctx.font = `800 26px ${F}`;
      ctx.fillText(String(p.pts), width - 60, textY);
    });

    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(247,245,236,0.5)";
    ctx.font = `600 13px ${F}`;
    ctx.fillText("QRACKS · " + new Date().toLocaleDateString("es-MX", {year:"numeric", month:"long", day:"numeric"}), width / 2, height - 24);

    return canvas;
  }

  async function shareResultsCard(list){
    if(!list.length){ toast("Todavía no hay nada que compartir"); return; }
    try{
      if(document.fonts && document.fonts.load){
        await Promise.all([
          document.fonts.load("800 34px Manrope"),
          document.fonts.load("700 18px Manrope"),
          document.fonts.load("600 17px Manrope")
        ]);
      }
    }catch(e){ /* fall back to system font if this fails */ }
    const canvas = drawResultsCardCanvas(list);
    canvas.toBlob(async (blob) => {
      if(!blob){ toast("No se pudo generar la imagen"); return; }
      const filename = "tabla-" + slugify(meta.groupName) + ".png";
      const file = new File([blob], filename, { type: "image/png" });
      if(navigator.share && navigator.canShare && navigator.canShare({ files: [file] })){
        try{
          await navigator.share({ files: [file] });
          return;
        }catch(e){ /* user cancelled or share failed — fall back to download */ }
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
      toast("✅ Listo, la imagen se descargó.");
    }, "image/png");
  }

  function progressData(){
    const played = meta.rounds.filter(r => r.resultsPublished).slice().sort((a,b)=>a.number-b.number);
    const series = {};
    meta.participants.forEach(p => {
      let cum = 0;
      series[p.id] = played.map(r => {
        r.matches.forEach(m => {
          const result = r.results[m.id];
          if(!result) return;
          const pick = (allPicksCache[p.id]||{})[r.id] ? (allPicksCache[p.id][r.id]||{})[m.id] : null;
          if(pick && pick === result) cum++;
        });
        return cum;
      });
    });
    return { rounds: played.map(r=>r.number), series };
  }

  function renderProgressChart(orderedList){
    const legendEl = document.getElementById("qz-chart-legend");
    const svgEl = document.getElementById("qz-chart-svg");
    if(!legendEl || !svgEl) return;
    const { rounds, series } = progressData();

    if(!rounds.length){
      legendEl.innerHTML = "";
      svgEl.innerHTML = `<p class="muted">Aún no hay jornadas jugadas para mostrar el progreso.</p>`;
      return;
    }
    if(chartSelectedIds === null){
      chartSelectedIds = new Set(orderedList.slice(0,5).map(p=>p.id));
    }
    const colorOf = (pid) => CHART_COLORS[orderedList.findIndex(p=>p.id===pid) % CHART_COLORS.length];

    legendEl.innerHTML = orderedList.map(p => {
      const on = chartSelectedIds.has(p.id);
      const color = colorOf(p.id);
      return `<button class="btn btn-sm" data-chip="${p.id}" style="border:1.5px solid ${on?color:'var(--line)'};background:${on?color+'22':'var(--chalk)'};color:${on?'var(--ink)':'var(--ink-soft)'};">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:5px;"></span>${esc(p.name)}
      </button>`;
    }).join("");
    legendEl.querySelectorAll("[data-chip]").forEach(chip => {
      chip.addEventListener("click", () => {
        const id = chip.dataset.chip;
        if(chartSelectedIds.has(id)) chartSelectedIds.delete(id); else chartSelectedIds.add(id);
        renderProgressChart(orderedList);
      });
    });

    const W = Math.max(420, rounds.length * 60), H = 240, padL = 34, padR = 14, padT = 14, padB = 28;
    const maxY = Math.max(1, ...Array.from(chartSelectedIds).flatMap(id => series[id] || [0]));
    const x = (i) => padL + (i * (W - padL - padR) / Math.max(1, rounds.length-1));
    const y = (v) => H - padB - (v * (H - padT - padB) / maxY);

    const gridLines = [];
    const steps = 4;
    for(let i=0;i<=steps;i++){
      const val = Math.round((maxY/steps)*i);
      const yy = y(val);
      gridLines.push(`<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="var(--line)" stroke-width="1"/>`);
      gridLines.push(`<text x="${padL-8}" y="${yy+4}" font-size="10" text-anchor="end" fill="var(--ink-soft)" font-family="Manrope, sans-serif">${val}</text>`);
    }
    const xLabels = rounds.map((rn,i) => `<text x="${x(i)}" y="${H-8}" font-size="10" text-anchor="middle" fill="var(--ink-soft)" font-family="Manrope, sans-serif">J${rn}</text>`).join("");

    const lines = Array.from(chartSelectedIds).map(id => {
      const pts = (series[id]||[]).map((v,i) => `${x(i)},${y(v)}`).join(" ");
      const dots = (series[id]||[]).map((v,i) => `<circle cx="${x(i)}" cy="${y(v)}" r="3" fill="${colorOf(id)}"/>`).join("");
      return `<polyline points="${pts}" fill="none" stroke="${colorOf(id)}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${dots}`;
    }).join("");

    svgEl.innerHTML = `
      <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" style="max-width:100%;">
        ${gridLines.join("")}
        ${xLabels}
        ${lines}
      </svg>
    `;
  }

  function renderHistDetail(round){
    const detail = document.getElementById("qz-hist-detail");
    const perParticipant = meta.participants.slice().sort((a,b) => a.name.localeCompare(b.name, "es", {sensitivity:"base"})).map(p => {
      const picks = (allPicksCache[p.id] || {})[round.id] || {};
      let correct = 0;
      const cells = round.matches.map(m => {
        const pick = picks[m.id];
        const result = round.results[m.id];
        const label = pick === 'A' ? m.teamA : pick === 'B' ? m.teamB : pick === 'D' ? 'Empate' : '—';
        const isCorrect = pick && result && pick === result;
        if(isCorrect) correct++;
        return `<td style="text-align:center;${isCorrect?'color:#1B4332;font-weight:700;':pick?'color:#7d251d;':'color:var(--ink-soft);'}">${esc(label)}</td>`;
      }).join("");
      return { name: p.name, correct, cellsHtml: cells };
    });
    const maxCorrect = Math.max(0, ...perParticipant.map(p => p.correct));
    const mvps = maxCorrect > 0 ? perParticipant.filter(p => p.correct === maxCorrect).map(p => p.name) : [];
    const rows = perParticipant.map(p => `<tr><td>${esc(p.name)} ${mvps.includes(p.name) ? '🏅' : ''}</td>${p.cellsHtml}<td style="font-weight:700;text-align:center;">${p.correct}</td></tr>`).join("");
    const resultRow = round.matches.map(m => {
      const r = round.results[m.id];
      const label = r==='A'? m.teamA : r==='B'? m.teamB : r==='D'?'Empate':'—';
      return `<td style="font-weight:700;text-align:center;">${esc(label)}</td>`;
    }).join("");
    detail.innerHTML = `
      ${mvps.length ? `
        <div class="card" style="border-color:var(--gold);background:#FFF9EC;">
          <div class="eyebrow" style="color:var(--gold-dim);">🏅 MVP de la Jornada ${round.number}</div>

  // ---------- ADMIN ----------
  // Returns null if this quiniela is fine (exempt, paid, or hasn't reached the free jornada limit yet),
  // or {amount, depositInfo, jornadaLimit} if it owes money and new jornadas should be gated.
  // The trigger is how many jornadas have been created; the amount owed is based on the
  // CURRENT participant count, so growth after a previous payment still gets captured.
  async function getPaymentStatus(){
    if(ROUTE !== "quiniela" || !SLUG || !meta) return null;
    try{
      const res = await fetch("/api/payment-status/" + encodeURIComponent(SLUG));
      if(!res.ok) return null;
      const entry = await res.json();
      if(!entry.exists || entry.exempt || entry.paid) return null;
      const jornadaLimit = (entry.customJornadaLimit !== null) ? entry.customJornadaLimit : entry.jornadaLimit;
      const roundCount = meta.rounds.length;
      if(roundCount < jornadaLimit) return null;
      const participantCount = meta.participants.length;
      return {
        amount: entry.pricePerParticipant * participantCount,
        depositInfo: entry.depositInfo || "Contacta a quien administra la plataforma para los datos de depósito.",
        jornadaLimit
      };
    }catch(e){ console.error("getPaymentStatus failed", e); return null; }
  }

    body.querySelectorAll("[data-role=cb-correct]").forEach(checkbox => {

  async function renderAdminParticipacion(body){
    const openRounds = meta.rounds.filter(r => classifyRound(r) === "porjugar").slice().sort((a,b)=>a.number-b.number);
    if(!openRounds.length){
      body.innerHTML = `<div class="card empty"><div class="display">No hay jornadas abiertas</div><p class="muted">No hay nadie por contestar en este momento. En cuanto crees una jornada nueva en Admin → Jornadas, aquí verás quién ya votó y quién falta.</p></div>${accessLinkCardHtml()}${spectatorLinkCardHtml()}`;
      wireAccessLinkCard(body);
      wireSpectatorLinkCard(body);
      return;
    }
    body.innerHTML = `<div class="card"><p class="muted">Cargando estatus de participación…</p></div>`;
    await ensureAllPicksLoaded();

    body.innerHTML = openRounds.map(round => {
      const total = round.matches.length;
      const rows = meta.participants.map(p => {
        const picks = (allPicksCache[p.id] || {})[round.id] || {};
        const count = round.matches.filter(m => picks[m.id]).length;
        let status;
        if(count === 0) status = {label:"Sin contestar", cls:"unpaid", icon:"❌"};
        else if(count < total) status = {label:`Incompleto (${count}/${total})`, cls:"unpaid", icon:"⚠️"};
        else status = {label:"Completo", cls:"paid", icon:"✅"};
        return { name: p.name, ...status, count };
      }).sort((a,b) => a.count - b.count || a.name.localeCompare(b.name));
      const missingNames = rows.filter(r => r.count < total).map(r => r.name);
      return `
        <div class="card">
          <div class="eyebrow" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
            <span>Jornada ${round.number} · ${total} partidos</span>
            <div style="display:flex;gap:6px;">
              ${missingNames.length ? `<button class="btn btn-ghost btn-sm" data-copy="${round.id}">📋 Copiar</button>` : ``}
              ${missingNames.length ? `<button class="btn btn-gold btn-sm" data-whatsapp="${round.id}">🟢 Abrir en WhatsApp</button>` : ``}
            </div>
          </div>
          <p class="muted" style="margin-top:-4px;">No se muestran los picks de nadie, solo si ya contestaron.</p>
          <table>
            <thead><tr><th>Participante</th><th>Estatus</th></tr></thead>
            <tbody>
              ${rows.map(r => `<tr><td>${esc(r.name)}</td><td><span class="badge ${r.cls}">${r.icon} ${r.label}</span></td></tr>`).join("")}
            </tbody>
          </table>
        </div>
      `;
    }).join("") + accessLinkCardHtml() + spectatorLinkCardHtml();

    function reminderText(round, missing){
      const bullets = missing.map(n => `• ${n}`).join("\n");
      return `⏰ Faltan por contestar la Jornada ${round.number}:\n${bullets}\n\n¡No se les olvide antes del cierre!`;
    }

    function missingFor(round){
      const total = round.matches.length;
      return meta.participants.filter(p => {
        const picks = (allPicksCache[p.id] || {})[round.id] || {};
        const count = round.matches.filter(m => picks[m.id]).length;
        return count < total;
      }).map(p => p.name);
    }

    body.querySelectorAll("[data-copy]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const round = openRounds.find(r => r.id === btn.dataset.copy);
        const text = reminderText(round, missingFor(round));
        try{
          await navigator.clipboard.writeText(text);
          toast("Recordatorio copiado ✅ pégalo donde quieras");
        }catch(e){
          toast("No se pudo copiar automáticamente, cópialo manualmente: " + text);
        }
      });
    });

    body.querySelectorAll("[data-whatsapp]").forEach(btn => {
      btn.addEventListener("click", () => {
        const round = openRounds.find(r => r.id === btn.dataset.whatsapp);
        const text = reminderText(round, missingFor(round));
        window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank");
      });
    });
    wireAccessLinkCard(body);
    wireSpectatorLinkCard(body);
  }
