<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quinielas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Work+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root{
    --pitch-dark:#0F2E22;
    --pitch:#173A2B;
    --pitch-light:#2D6A4F;
    --chalk:#F7F5EC;
    --paper:#FFFFFF;
    --gold:#E3B23C;
    --gold-dim:#c99a2f;
    --red:#C1443A;
    --ink:#10231C;
    --ink-soft:#4B5B53;
    --line: rgba(16,35,28,0.12);
    --shadow: 0 6px 20px rgba(15,46,34,0.12);
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  #quiniela-root{
    font-family:'Work Sans', sans-serif;
    background:var(--chalk);
    color:var(--ink);
    min-height:100%;
    line-height:1.4;
  }
  #quiniela-root .display{
    font-family:'Teko', sans-serif;
    font-weight:600;
    letter-spacing:0.01em;
  }
  #quiniela-root .mono{
    font-family:'Space Mono', monospace;
  }
  #quiniela-root button{
    font-family:inherit;
    cursor:pointer;
  }
  #quiniela-root .btn{
    border:none;
    border-radius:10px;
    padding:10px 16px;
    font-weight:600;
    font-size:14px;
    transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
  }
  #quiniela-root .btn:active{ transform:scale(0.97); }
  #quiniela-root .btn:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }
  #quiniela-root .btn-primary{ background:var(--pitch-dark); color:var(--chalk); }
  #quiniela-root .btn-primary:hover{ background:var(--pitch); }
  #quiniela-root .btn-gold{ background:var(--gold); color:var(--pitch-dark); }
  #quiniela-root .btn-gold:hover{ background:var(--gold-dim); }
  #quiniela-root .btn-ghost{ background:transparent; color:var(--pitch-dark); border:1.5px solid var(--line); }
  #quiniela-root .btn-ghost:hover{ background:rgba(15,46,34,0.06); }
  #quiniela-root .btn-danger{ background:var(--red); color:#fff; }
  #quiniela-root .btn-danger:hover{ opacity:0.88; }
  #quiniela-root .btn:disabled{ opacity:0.4; cursor:not-allowed; }
  #quiniela-root .btn-sm{ padding:6px 12px; font-size:12.5px; border-radius:8px; }

  /* header / scoreboard */
  #quiniela-root .qz-header{
    background: linear-gradient(180deg, var(--pitch-dark), var(--pitch));
    color:var(--chalk);
    padding:18px 20px 16px;
    position:sticky; top:0; z-index:20;
    box-shadow:var(--shadow);
  }
  #quiniela-root .qz-header-top{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  #quiniela-root .qz-brand{
    display:flex; align-items:baseline; gap:8px;
  }
  #quiniela-root .qz-brand .display{
    font-size:30px; text-transform:uppercase; line-height:1;
  }
  #quiniela-root .qz-brand .dot{ color:var(--gold); }
  #quiniela-root .qz-user-chip{
    display:flex; align-items:center; gap:8px;
    background:rgba(247,245,236,0.1);
    border:1px solid rgba(247,245,236,0.18);
    padding:6px 10px 6px 12px; border-radius:999px;
    font-size:13px; font-weight:600;
  }
  #quiniela-root .qz-user-chip button{
    background:rgba(247,245,236,0.14); border:none; color:var(--chalk);
    border-radius:999px; width:24px; height:24px; font-size:12px;
  }
  #quiniela-root .qz-tabs{
    display:flex; gap:4px; margin-top:16px; overflow-x:auto; padding-bottom:2px;
    scrollbar-width:none;
  }
  #quiniela-root .qz-tabs::-webkit-scrollbar{ display:none; }
  #quiniela-root .qz-tab{
    background:transparent; border:none; color:rgba(247,245,236,0.65);
    padding:8px 4px; font-weight:600; font-size:13.5px; white-space:nowrap;
    border-bottom:3px solid transparent; letter-spacing:0.01em;
  }
  #quiniela-root .qz-tab.active{ color:var(--chalk); border-bottom-color:var(--gold); }
  #quiniela-root .qz-tab + .qz-tab{ margin-left:14px; }

  #quiniela-root .qz-main{ max-width:760px; margin:0 auto; padding:20px 16px 80px; }

  /* cards */
  #quiniela-root .card{
    background:var(--paper); border-radius:var(--radius); border:1px solid var(--line);
    box-shadow:var(--shadow); padding:18px; margin-bottom:16px;
  }
  #quiniela-root .card h3{ margin:0 0 4px; font-size:15px; }
  #quiniela-root .muted{ color:var(--ink-soft); font-size:13px; }
  #quiniela-root .eyebrow{
    text-transform:uppercase; letter-spacing:0.08em; font-size:11px; font-weight:700;
    color:var(--pitch-light); margin-bottom:6px;
  }

  /* clock */
  #quiniela-root .clock-card{
    background: linear-gradient(180deg, var(--pitch-dark), var(--pitch));
    color:var(--chalk); border-radius:var(--radius); padding:18px 20px; margin-bottom:16px;
    box-shadow:var(--shadow); position:relative; overflow:hidden;
  }
  #quiniela-root .clock-card::after{
    content:""; position:absolute; inset:0;
    background: radial-gradient(circle at 90% -10%, rgba(227,178,60,0.25), transparent 55%);
    pointer-events:none;
  }
  #quiniela-root .clock-label{ font-size:12px; text-transform:uppercase; letter-spacing:0.1em; opacity:0.75; margin-bottom:8px; }
  #quiniela-root .clock-digits{
    display:flex; gap:8px; flex-wrap:wrap;
  }
  #quiniela-root .clock-seg{
    background:rgba(0,0,0,0.28); border:1px solid rgba(227,178,60,0.35);
    border-radius:8px; padding:8px 12px; min-width:58px; text-align:center;
  }
  #quiniela-root .clock-seg .num{ font-size:26px; font-weight:700; color:var(--gold); display:block; }
  #quiniela-root .clock-seg .unit{ font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; opacity:0.7; }
  #quiniela-root .clock-closed{ font-size:15px; font-weight:600; color:var(--gold); }

  /* match card */
  #quiniela-root .match-card{
    background:var(--paper); border-radius:var(--radius); border:1px solid var(--line);
    padding:14px 16px; margin-bottom:12px; box-shadow:var(--shadow);
  }
  #quiniela-root .match-teams{
    display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px;
  }
  #quiniela-root .match-team{ font-weight:700; font-size:16px; flex:1; text-align:center; }
  #quiniela-root .match-team.left{ text-align:right; }
  #quiniela-root .match-team.right{ text-align:left; }
  #quiniela-root .match-vs{
    font-family:'Space Mono', monospace; font-size:11px; color:var(--ink-soft);
    background:var(--chalk); border-radius:6px; padding:3px 7px; flex-shrink:0;
  }
  #quiniela-root .pick-row{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  #quiniela-root .pick-btn{
    border:1.5px solid var(--line); background:var(--chalk); border-radius:10px;
    padding:10px 6px; font-weight:600; font-size:13px; color:var(--ink); text-align:center;
  }
  #quiniela-root .pick-btn.selected{ background:var(--pitch-dark); border-color:var(--pitch-dark); color:var(--chalk); }
  #quiniela-root .pick-btn.correct{ background:#DCEFE1; border-color:#2D6A4F; color:#1B4332; }
  #quiniela-root .pick-btn.wrong{ background:#F6E1DE; border-color:var(--red); color:#7d251d; }
  #quiniela-root .pick-btn:disabled{ cursor:default; }
  #quiniela-root .result-tag{
    margin-top:8px; font-size:12px; font-weight:700; text-align:center;
    color:var(--pitch-light);
  }

  /* login */
  #quiniela-root .login-wrap{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
    background: radial-gradient(circle at 50% 0%, var(--pitch-light), var(--pitch-dark) 70%);
  }
  #quiniela-root .login-card{
    background:var(--paper); border-radius:20px; padding:28px 24px; max-width:420px; width:100%;
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
  }
  #quiniela-root .login-title{ font-size:38px; text-align:center; line-height:1; margin-bottom:2px; }
  #quiniela-root .login-sub{ text-align:center; color:var(--ink-soft); font-size:13px; margin-bottom:20px; }
  #quiniela-root .name-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:8px; max-height:340px; overflow-y:auto; padding-right:2px;
  }
  #quiniela-root .name-btn{
    border:1.5px solid var(--line); background:var(--paper); border-radius:10px;
    padding:13px 10px; font-weight:700; font-size:14px; text-align:center;
    box-shadow:0 2px 6px rgba(15,46,34,0.08);
    transition:transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease;
    cursor:pointer;
  }
  #quiniela-root .name-btn:hover{
    border-color:var(--pitch-dark); background:var(--pitch-dark); color:var(--chalk);
    transform:translateY(-1px); box-shadow:0 4px 10px rgba(15,46,34,0.18);
  }
  #quiniela-root .name-btn:active{ transform:translateY(0); }
  #quiniela-root .name-btn:hover .role{ color:var(--gold); }
  #quiniela-root .name-btn .role{ display:block; font-size:10px; color:var(--gold-dim); font-weight:700; margin-top:2px; }

  /* table */
  #quiniela-root table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  #quiniela-root th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--ink-soft); padding:8px 6px; border-bottom:2px solid var(--line);
  }
  #quiniela-root td{ padding:9px 6px; border-bottom:1px solid var(--line); }
  #quiniela-root tr.me{ background:rgba(227,178,60,0.14); }
  #quiniela-root .pos{ font-family:'Space Mono', monospace; font-weight:700; color:var(--pitch-light); }
  #quiniela-root .pos.top1{ color:var(--gold-dim); }

  /* forms */
  #quiniela-root input[type=text], #quiniela-root input[type=password], #quiniela-root input[type=number], #quiniela-root input[type=datetime-local], #quiniela-root select{
    width:100%; padding:9px 11px; border-radius:8px; border:1.5px solid var(--line);
    font-family:inherit; font-size:14px; background:var(--paper); color:var(--ink);
  }
  #quiniela-root label{ font-size:12px; font-weight:700; color:var(--ink-soft); display:block; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.04em; }
  #quiniela-root .field{ margin-bottom:12px; }
  #quiniela-root .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  #quiniela-root .match-edit-row{
    display:grid; grid-template-columns:1fr 1fr auto; gap:8px; align-items:end; margin-bottom:10px;
  }
  #quiniela-root .icon-x{ background:var(--red); color:#fff; border:none; border-radius:8px; width:36px; height:36px; }

  #quiniela-root .badge{ display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:700; padding:3px 9px; border-radius:999px; }
  #quiniela-root .badge.paid{ background:#DCEFE1; color:#1B4332; }
  #quiniela-root .badge.unpaid{ background:#F6E1DE; color:#7d251d; }
  #quiniela-root .badge.admin{ background:rgba(227,178,60,0.25); color:var(--gold-dim); }

  #quiniela-root .empty{
    text-align:center; padding:40px 20px; color:var(--ink-soft);
  }
  #quiniela-root .empty .display{ font-size:26px; color:var(--pitch-dark); }

  #quiniela-root .divider{ height:1px; background:var(--line); margin:16px 0; }
  #quiniela-root .toast{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:var(--pitch-dark); color:var(--chalk); padding:10px 18px; border-radius:999px;
    font-size:13px; font-weight:600; box-shadow:var(--shadow); z-index:100;
    opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease;
  }
  #quiniela-root .toast.show{ opacity:1; transform:translateX(-50%) translateY(-4px); }

  #quiniela-root .history-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 14px; border:1px solid var(--line); border-radius:10px; margin-bottom:8px; background:var(--paper);
  }
  #quiniela-root .history-item:hover{ border-color:var(--pitch-light); }

  #quiniela-root .section-title{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  #quiniela-root .section-title .display{ font-size:24px; }

  @media (max-width:480px){
    #quiniela-root .qz-brand .display{ font-size:24px; }
    #quiniela-root .name-grid{ grid-template-columns:1fr 1fr; }
    #quiniela-root .clock-seg{ min-width:46px; padding:6px 8px; }
    #quiniela-root .clock-seg .num{ font-size:20px; }
  }
</style>

</head>
<body>
<div id="quiniela-root"></div>

<script>
(function(){
  const TEAMS = ["América","Atlas","Atlético San Luis","Cruz Azul","Chivas","Juárez","León","Mazatlán","Monterrey","Necaxa","Pachuca","Puebla","Pumas","Querétaro","Santos","Tigres","Toluca","Xolos"];

  // ---------- routing ----------
  // "/"              -> the original group's quiniela (unchanged, same keys as always)
  // "/crear"         -> landing page to create a brand new, independent quiniela
  // "/q/:slug"       -> someone else's independently-created quiniela
  // "/panel-plataforma" -> owner-only dashboard listing every quiniela created on the platform
  const PLATFORM_INDEX_KEY = "platform_index";
  const PLATFORM_SETTINGS_KEY = "platform_settings";
  const pathParts = window.location.pathname.split("/").filter(Boolean);
  let ROUTE = "root";
  let SLUG = null;
  if(pathParts.length === 0){ ROUTE = "root"; }
  else if(pathParts[0] === "q" && pathParts[1]){ ROUTE = "quiniela"; SLUG = decodeURIComponent(pathParts[1]); }
  else if(pathParts[0] === "crear"){ ROUTE = "crear"; }
  else if(pathParts[0] === "panel-plataforma"){ ROUTE = "platform"; }
  else { ROUTE = "unknown"; }

  function currentMetaKey(){ return SLUG ? ("quiniela:" + SLUG + ":meta") : "quiniela_meta_v1"; }
  function currentPicksKey(pid){ return SLUG ? ("quiniela:" + SLUG + ":picks:" + pid) : ("quiniela_picks_" + pid + "_v1"); }
  function metaKeyFor(slug){ return "quiniela:" + slug + ":meta"; }

  function slugify(str){
    return (str || "")
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // strip accents
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "")
      .slice(0, 40) || "quiniela";
  }

  const DEFAULT_NAMES = ["Gerardo","Kareem","Nacho","Pablo","Rodrigo","Axel","Alan","Alejandro","Oski","Alexander","Germán","Mithcar","Kay","Luis","Pepe","Kevin","Memo","Esteban","Rober"];

  function uid(prefix){ return prefix + "_" + Math.random().toString(36).slice(2,9); }

  function defaultMeta(){
    const participants = DEFAULT_NAMES.map((name,i) => ({
      id: uid("p"),
      name,
      isAdmin: i===0 || i===4, // Gerardo & Rodrigo start as admins, editable later
      paid: false
    }));
    return {
      groupName: "Quiniela Liga MX",
      participants,
      rounds: [],
      settings: {
        ownerPassword: "gol2026",
        entryFee: 500,
        ownerParticipantId: participants[0].id,
        sportsdbSeason: "2025-2026"
      }
    };
  }

  // Used when someone creates their own new quiniela via /crear — no prefilled names.
  function freshTenantMeta(groupName, creatorName, ownerPassword){
    const creator = { id: uid("p"), name: creatorName, isAdmin: true, paid: false, pin: null };
    return {
      groupName,
      participants: [creator],
      rounds: [],
      settings: {
        ownerPassword: ownerPassword || "admin123",
        entryFee: 0,
        ownerParticipantId: creator.id,
        sportsdbSeason: "2025-2026"
      }
    };
  }

  // ---------- platform-level storage (list of all quinielas, threshold/pricing settings) ----------
  async function getPlatformIndex(){
    try{
      const r = await kvGet(PLATFORM_INDEX_KEY);
      return r.found ? r.value : { quinielas: [] };
    }catch(e){ console.error("getPlatformIndex failed", e); return { quinielas: [] }; }
  }
  async function setPlatformIndex(idx){
    try{ return await kvSet(PLATFORM_INDEX_KEY, idx); }
    catch(e){ console.error("setPlatformIndex failed", e); return false; }
  }
  async function getPlatformSettings(){
    try{
      const r = await kvGet(PLATFORM_SETTINGS_KEY);
      return r.found ? r.value : { threshold: 10, pricePerParticipant: 10, dashboardPassword: "plataforma2026" };
    }catch(e){ console.error("getPlatformSettings failed", e); return { threshold: 10, pricePerParticipant: 10, dashboardPassword: "plataforma2026" }; }
  }
  async function setPlatformSettings(s){
    try{ return await kvSet(PLATFORM_SETTINGS_KEY, s); }
    catch(e){ console.error("setPlatformSettings failed", e); return false; }
  }


  // IMPORTANT: kvGet distinguishes "genuinely doesn't exist yet" (404) from
  // "the request failed" (network/server error). Callers that decide whether
  // to initialize fresh data (boot()) must never treat an error as "not found" —
  // doing so would silently overwrite real data on a transient failure.
  async function kvGet(key){
    const res = await fetch("/api/kv/" + encodeURIComponent(key));
    if(res.status === 404) return { found: false };
    if(!res.ok) throw new Error("kv get failed: HTTP " + res.status);
    const data = await res.json();
    return { found: true, value: data.value };
  }
  async function kvSet(key, value){
    const res = await fetch("/api/kv/" + encodeURIComponent(key), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ value })
    });
    return res.ok;
  }
  async function kvDelete(key){
    const res = await fetch("/api/kv/" + encodeURIComponent(key), { method: "DELETE" });
    return res.ok;
  }
  // getMeta: returns the saved meta, or null if it genuinely doesn't exist yet.
  // Throws (does NOT return null) if the request itself failed — callers must
  // handle that separately and must not initialize fresh data in that case.
  async function getMeta(){
    const r = await kvGet(currentMetaKey());
    return r.found ? r.value : null;
  }
  async function setMeta(meta){
    try{
      return await kvSet(currentMetaKey(), meta);
    }catch(e){ console.error("save meta failed", e); return false; }
  }
  async function getPicks(pid){
    try{
      const r = await kvGet(currentPicksKey(pid));
      return r.found ? r.value : {};
    }catch(e){ console.error("getPicks failed", e); return {}; }
  }
  async function setPicks(pid, data){
    try{
      return await kvSet(currentPicksKey(pid), data);
    }catch(e){ console.error("save picks failed", e); return false; }
  }

  // ---------- app state ----------
  let meta = null;
  let currentUser = null; // participant object (from meta.participants) for this session
  let myPicks = {};       // { roundId: { matchId: 'A'|'D'|'B' } }
  let allPicksCache = {}; // { participantId: picksObj } - loaded on demand for standings/history/export
  let activeTab = "jornada";
  let adminSubTab = "rondas";
  let ownerUnlocked = false;
  let loadingAllPicks = false;
  let jornadaFilter = "porjugar"; // porjugar | envivo | jugados
  let chartSelectedIds = null; // set on first chart render (top 5)
  const CHART_COLORS = ["#E3B23C","#2D6A4F","#C1443A","#3A6EA5","#8E44AD","#D2691E","#16A085","#B8860B","#7f8c8d","#E75480"];

  const root = document.getElementById("quiniela-root");

  function toast(msg){
    let t = document.getElementById("qz-toast");
    if(!t){
      t = document.createElement("div");
      t.id = "qz-toast";
      t.className = "toast";
      root.appendChild(t);
    }
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._h);
    t._h = setTimeout(()=> t.classList.remove("show"), 2200);
  }

  function esc(s){
    return String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  // ---------- derived helpers ----------
  function activeRound(){
    // last round that has no results published yet
    const open = meta.rounds.filter(r => !r.resultsPublished);
    return open.length ? open[open.length-1] : null;
  }
  function isRoundLocked(round){
    if(!round) return true;
    return Date.now() > new Date(round.deadline).getTime();
  }
  function timeParts(deadline){
    let diff = new Date(deadline).getTime() - Date.now();
    if(diff < 0) diff = 0;
    const d = Math.floor(diff/86400000);
    const h = Math.floor((diff%86400000)/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    return {d,h,m,s};
  }

  async function ensureAllPicksLoaded(){
    if(loadingAllPicks) return;
    loadingAllPicks = true;
    const entries = await Promise.all(meta.participants.map(async p => [p.id, await getPicks(p.id)]));
    allPicksCache = Object.fromEntries(entries);
    loadingAllPicks = false;
  }

  function pointsFor(participantId){
    const picks = allPicksCache[participantId] || {};
    let pts = 0, played = 0;
    meta.rounds.forEach(r => {
      if(!r.resultsPublished) return;
      r.matches.forEach(m => {
        const result = r.results ? r.results[m.id] : null;
        if(!result) return;
        played++;
        const pick = picks[r.id] ? picks[r.id][m.id] : null;
        if(pick && pick === result) pts++;
      });
    });
    return {pts, played};
  }

  function standingsList(){
    return meta.participants.map(p => {
      const {pts} = pointsFor(p.id);
      return {...p, pts};
    }).sort((a,b) => b.pts - a.pts);
  }

  // ---------- render root ----------
  async function render(){
    if(!meta){
      root.innerHTML = `<div class="login-wrap"><div class="login-card"><p class="muted" style="text-align:center;">Cargando…</p></div></div>`;
      return;
    }
    if(!currentUser){
      renderLogin();
      return;
    }
    renderApp();
  }

  function renderLogin(){
    const sortedParticipants = meta.participants.slice().sort((a,b) => a.name.localeCompare(b.name, "es", {sensitivity:"base"}));
    const names = sortedParticipants.map(p => `
      <button class="name-btn" data-id="${p.id}">
        ${esc(p.name)} ${p.pin ? "🔒" : ""}
        ${p.isAdmin ? `<span class="role">ADMIN</span>` : ``}
      </button>
    `).join("");
    root.innerHTML = `
      <div class="login-wrap">
        <div class="login-card">
          <div class="login-title display">${esc(meta.groupName)}</div>
          <div class="login-sub">Toca tu nombre para entrar 👇</div>
          <div class="name-grid">${names}</div>
          <p class="muted" style="text-align:center;margin-top:14px;">🔒 = ya tiene PIN configurado. Si es tu nombre y no tiene candado, tócalo y ponle un PIN antes que alguien más lo haga.</p>
          <p class="muted" style="text-align:center;margin-top:8px;">¿Quieres tu propia quiniela? <a href="/crear" style="color:var(--pitch-light);font-weight:700;">Créala aquí</a></p>
        </div>
      </div>
    `;
    root.querySelectorAll(".name-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        const p = meta.participants.find(x => x.id === btn.dataset.id);
        if(!p.pin){
          const newPin = window.prompt("Este nombre todavía no tiene PIN. Ponle uno de 4 dígitos para que nadie más pueda entrar como tú:");
          if(newPin === null) return;
          const cleanPin = newPin.trim();
          if(!/^\d{4}$/.test(cleanPin)){ toast("El PIN debe ser exactamente 4 números"); return; }
          p.pin = cleanPin;
          const ok = await setMeta(meta);
          if(!ok){ p.pin = null; toast("No se pudo guardar el PIN, intenta de nuevo"); return; }
          toast("PIN configurado ✅ — no lo olvides");
        } else {
          const entered = window.prompt("Escribe el PIN de " + p.name + " para entrar:");
          if(entered === null) return;
          if(entered.trim() !== p.pin){ toast("PIN incorrecto"); return; }
        }
        currentUser = p;
        myPicks = await getPicks(p.id);
        activeTab = "jornada";
        render();
      });
    });
  }

  function tabList(){
    const tabs = [
      {id:"jornada", label:"Jornada"},
      {id:"tabla", label:"Tabla"},
      {id:"historial", label:"Historial"},
      {id:"pagos", label:"Pagos"},
    ];
    if(currentUser.isAdmin) tabs.push({id:"admin", label:"Admin"});
    return tabs;
  }

  function renderApp(){
    const tabs = tabList();
    root.innerHTML = `
      <div class="qz-header">
        <div class="qz-header-top">
          <div class="qz-brand"><span class="display">${esc(meta.groupName)}</span><span class="display dot">.</span></div>
          <div class="qz-user-chip">
            ${esc(currentUser.name)} ${currentUser.isAdmin ? "★" : ""}
            <button id="qz-change-pin" title="Cambiar mi PIN">🔑</button>
            <button id="qz-switch-user" title="Cambiar usuario">↺</button>
          </div>
        </div>
        <div class="qz-tabs">
          ${tabs.map(t => `<button class="qz-tab ${t.id===activeTab?'active':''}" data-tab="${t.id}">${t.label}</button>`).join("")}
        </div>
      </div>
      <div class="qz-main" id="qz-main"></div>
    `;
    document.getElementById("qz-switch-user").addEventListener("click", () => {
      currentUser = null;
      ownerUnlocked = false;
      render();
    });
    document.getElementById("qz-change-pin").addEventListener("click", async () => {
      if(currentUser.pin){
        const current = window.prompt("Escribe tu PIN actual:");
        if(current === null) return;
        if(current.trim() !== currentUser.pin){ toast("PIN actual incorrecto"); return; }
      }
      const newPin = window.prompt("Escribe tu nuevo PIN (4 dígitos):");
      if(newPin === null) return;
      const cleanPin = newPin.trim();
      if(!/^\d{4}$/.test(cleanPin)){ toast("El PIN debe ser exactamente 4 números"); return; }
      const previousPin = currentUser.pin;
      currentUser.pin = cleanPin;
      const ok = await setMeta(meta);
      if(!ok){ currentUser.pin = previousPin; toast("No se pudo cambiar el PIN, intenta de nuevo"); return; }
      toast("PIN actualizado ✅");
    });
    root.querySelectorAll(".qz-tab").forEach(btn => {
      btn.addEventListener("click", () => {
        activeTab = btn.dataset.tab;
        render();
      });
    });
    const main = document.getElementById("qz-main");
    if(activeTab === "jornada") renderJornada(main);
    else if(activeTab === "tabla") renderTabla(main);
    else if(activeTab === "historial") renderHistorial(main);
    else if(activeTab === "pagos") renderPagos(main);
    else if(activeTab === "admin") renderAdmin(main);
  }

  // ---------- JORNADA (voting, filtered like Por jugar / En vivo / Jugados) ----------
  let clockInterval = null;

  function classifyRound(round){
    if(round.resultsPublished) return "jugados";
    if(isRoundLocked(round)) return "envivo";
    return "porjugar";
  }

  async function renderJornada(main){
    if(clockInterval){ clearInterval(clockInterval); clockInterval = null; }

    const counts = {porjugar:0, envivo:0, jugados:0};
    meta.rounds.forEach(r => counts[classifyRound(r)]++);
    const filters = [
      {id:"porjugar", label:"Por jugar"},
      {id:"envivo", label:"En vivo"},
      {id:"jugados", label:"Jugados"},
    ];

    main.innerHTML = `
      <div class="qz-tabs" style="margin-bottom:14px;">
        ${filters.map(f => `<button class="qz-tab" data-jf="${f.id}" style="color:${f.id===jornadaFilter?'var(--pitch-dark)':'var(--ink-soft)'};border-bottom-color:${f.id===jornadaFilter?'var(--gold)':'transparent'};">${f.label} ${counts[f.id]?`· ${counts[f.id]}`:''}</button>`).join("")}
      </div>
      <div id="qz-jornada-list"></div>
    `;
    root.querySelectorAll("[data-jf]").forEach(btn => {
      btn.addEventListener("click", () => { jornadaFilter = btn.dataset.jf; renderJornada(main); });
    });

    const list = document.getElementById("qz-jornada-list");
    const rounds = meta.rounds.filter(r => classifyRound(r) === jornadaFilter).slice().sort((a,b)=>a.number-b.number);

    if(!rounds.length){
      const emptyMsg = {
        porjugar: "No hay jornadas abiertas para votar en este momento.",
        envivo: "No hay jornadas cerradas esperando resultado.",
        jugados: "Todavía no hay jornadas con resultados publicados."
      }[jornadaFilter];
      list.innerHTML = `<div class="card empty"><div class="display">Nada por aquí</div><p class="muted">${emptyMsg}</p></div>`;
      return;
    }

    // "En vivo" reveals everyone's picks (fair game — the deadline already passed for these)
    if(jornadaFilter === "envivo"){
      list.innerHTML = `<div class="card"><p class="muted">Cargando picks de todos…</p></div>`;
      await ensureAllPicksLoaded();
    }

    list.innerHTML = rounds.map(r => `<div class="card" id="qz-round-${r.id}" style="padding:16px;"></div>`).join("");

    rounds.forEach(round => {
      const box = document.getElementById("qz-round-" + round.id);
      if(jornadaFilter === "porjugar") renderRoundVoting(box, round);
      else if(jornadaFilter === "envivo") renderRoundLocked(box, round);
      else renderRoundPlayed(box, round);
    });

    if(jornadaFilter === "porjugar"){
      clockInterval = setInterval(() => {
        rounds.forEach(round => {
          if(isRoundLocked(round)){ renderJornada(main); return; }
          const el = document.getElementById("qz-clockbody-" + round.id);
          if(el) el.innerHTML = clockDigitsHtml(round.deadline);
        });
      }, 1000);
    }
  }

  function clockDigitsHtml(deadline){
    const {d,h,m,s} = timeParts(deadline);
    return `
      <div class="clock-digits">
        <div class="clock-seg"><span class="num mono">${String(d).padStart(2,'0')}</span><span class="unit">días</span></div>
        <div class="clock-seg"><span class="num mono">${String(h).padStart(2,'0')}</span><span class="unit">hrs</span></div>
        <div class="clock-seg"><span class="num mono">${String(m).padStart(2,'0')}</span><span class="unit">min</span></div>
        <div class="clock-seg"><span class="num mono">${String(s).padStart(2,'0')}</span><span class="unit">seg</span></div>
      </div>
    `;
  }

  function matchTeamsHtml(m){
    return `
      <div class="match-teams">
        <span class="match-team left">${esc(m.teamA)}</span>
        <span class="match-vs">VS</span>
        <span class="match-team right">${esc(m.teamB)}</span>
      </div>
    `;
  }

  // "Por jugar": open for voting, live countdown
  function renderRoundVoting(box, round){
    const roundPicks = myPicks[round.id] || {};
    box.innerHTML = `
      <div class="clock-card" style="margin-bottom:14px;">
        <div class="clock-label">Jornada ${round.number} · cierre de quiniela</div>
        <div id="qz-clockbody-${round.id}">${clockDigitsHtml(round.deadline)}</div>
      </div>
      <div id="qz-matches-${round.id}"></div>
      <p class="muted" id="qz-savestatus-${round.id}" style="text-align:center;">Tus picks se guardan solos apenas los eliges.</p>
      <button class="btn btn-primary" data-save="${round.id}" style="width:100%;padding:14px;font-size:15px;">Guardar mis picks</button>
    `;
    const matchesDiv = document.getElementById("qz-matches-" + round.id);
    const statusEl = document.getElementById("qz-savestatus-" + round.id);
    matchesDiv.innerHTML = round.matches.map(m => {
      const pick = roundPicks[m.id];
      return `
        <div class="match-card">
          ${matchTeamsHtml(m)}
          <div class="pick-row" data-match="${m.id}">
            <button class="pick-btn ${pick==='A'?'selected':''}" data-val="A">${esc(m.teamA)}</button>
            <button class="pick-btn ${pick==='D'?'selected':''}" data-val="D">Empate</button>
            <button class="pick-btn ${pick==='B'?'selected':''}" data-val="B">${esc(m.teamB)}</button>
          </div>
        </div>
      `;
    }).join("");
    matchesDiv.querySelectorAll(".pick-row").forEach(row => {
      row.querySelectorAll(".pick-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          if(isRoundLocked(round)){ toast("Se cerró la quiniela justo ahora ⏱️"); renderJornada(document.getElementById("qz-main")); return; }
          const matchId = row.dataset.match;
          if(!myPicks[round.id]) myPicks[round.id] = {};
          myPicks[round.id][matchId] = btn.dataset.val;
          row.querySelectorAll(".pick-btn").forEach(b => b.classList.toggle("selected", b===btn));
          statusEl.textContent = "Guardando…";
          const ok = await setPicks(currentUser.id, myPicks);
          statusEl.textContent = ok ? "✅ Guardado" : "❌ No se pudo guardar — revisa tu conexión e inténtalo de nuevo";
          statusEl.style.color = ok ? "var(--pitch-light)" : "var(--red)";
        });
      });
    });
    box.querySelector("[data-save]").addEventListener("click", async () => {
      if(isRoundLocked(round)){ toast("Se cerró la quiniela justo ahora ⏱️"); renderJornada(document.getElementById("qz-main")); return; }
      const ok = await setPicks(currentUser.id, myPicks);
      toast(ok ? "Picks guardados ✅" : "No se pudo guardar, intenta de nuevo");
    });
  }

  // "En vivo": locked, waiting for admin to publish results
  function renderRoundLocked(box, round){
    const roundPicks = myPicks[round.id] || {};
    const pickLabel = (val, m) => val==='A' ? m.teamA : val==='B' ? m.teamB : val==='D' ? 'Empate' : '—';
    box.innerHTML = `
      <div class="eyebrow" style="display:flex;justify-content:space-between;align-items:center;">
        <span>Jornada ${round.number}</span>
        <span class="badge unpaid">🔒 Cerrada, esperando resultado</span>
      </div>
      ${round.matches.map(m => {
        const pick = roundPicks[m.id];
        return `
          <div class="match-card">
            ${matchTeamsHtml(m)}
            <div class="pick-row">
              <button class="pick-btn ${pick==='A'?'selected':''}" disabled>${esc(m.teamA)}</button>
              <button class="pick-btn ${pick==='D'?'selected':''}" disabled>Empate</button>
              <button class="pick-btn ${pick==='B'?'selected':''}" disabled>${esc(m.teamB)}</button>
            </div>
            ${!pick ? `<div class="result-tag" style="color:var(--red);">No guardaste un pick — 0 pts en este partido</div>` : ``}

      <div class="divider"></div>
      <div class="eyebrow">Lo que votó todo el mundo</div>
      <p class="muted" style="margin-top:-4px;">Ya se cerró la jornada, así que no hay ventaja en verlo — solo para tus cálculos.</p>
      <div style="overflow-x:auto;">
        <table>
          <thead><tr><th>Participante</th>${round.matches.map(m=>`<th>${esc(m.teamA)}<br>vs ${esc(m.teamB)}</th>`).join("")}</tr></thead>
          <tbody>
            ${meta.participants.map(p => {
              const picks = (allPicksCache[p.id] || {})[round.id] || {};
              return `<tr class="${p.id===currentUser.id?'me':''}"><td>${esc(p.name)}</td>${round.matches.map(m => `<td>${esc(pickLabel(picks[m.id], m))}</td>`).join("")}</tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>
    `;
  }

  // "Jugados": results known, show correct/wrong
  function renderRoundPlayed(box, round){
    const roundPicks = myPicks[round.id] || {};
    let correct = 0, total = 0;
    const matchesHtml = round.matches.map(m => {
      const pick = roundPicks[m.id];
      const result = round.results[m.id];
      if(result) total++;
      const gotIt = pick && result && pick === result;
      if(gotIt) correct++;
      const cls = (val) => pick !== val ? '' : (gotIt ? 'correct' : 'wrong');
      return `
        <div class="match-card">
          ${matchTeamsHtml(m)}
          <div class="pick-row">
            <button class="pick-btn ${cls('A')}" disabled>${esc(m.teamA)}</button>
            <button class="pick-btn ${cls('D')}" disabled>Empate</button>
            <button class="pick-btn ${cls('B')}" disabled>${esc(m.teamB)}</button>
          </div>
          <div class="result-tag">Resultado: ${result==='A'?esc(m.teamA):result==='B'?esc(m.teamB):'Empate'} ${gotIt ? '· acertaste ✅' : (pick ? '· fallaste ❌' : '· no participaste')}</div>
        </div>
      `;
    }).join("");
    box.innerHTML = `
      <div class="eyebrow" style="display:flex;justify-content:space-between;align-items:center;">
        <span>Jornada ${round.number}</span>
        <span class="badge paid">${correct}/${total} aciertos</span>
      </div>
      ${matchesHtml}
    `;
  }

  function progressData(){
    const played = meta.rounds.filter(r => r.resultsPublished).slice().sort((a,b)=>a.number-b.number);
    const series = {};
    meta.participants.forEach(p => {
      let cum = 0;
      series[p.id] = played.map(r => {
        r.matches.forEach(m => {
          const result = r.results[m.id];
          if(!result) return;
          const pick = (allPicksCache[p.id]||{})[r.id] ? (allPicksCache[p.id][r.id]||{})[m.id] : null;
          if(pick && pick === result) cum++;
        });
        return cum;
      });
    });
    return { rounds: played.map(r=>r.number), series };
  }

  function renderProgressChart(orderedList){
    const legendEl = document.getElementById("qz-chart-legend");
    const svgEl = document.getElementById("qz-chart-svg");
    if(!legendEl || !svgEl) return;
    const { rounds, series } = progressData();

    if(!rounds.length){
      legendEl.innerHTML = "";
      svgEl.innerHTML = `<p class="muted">Aún no hay jornadas jugadas para mostrar el progreso.</p>`;
      return;
    }
    if(chartSelectedIds === null){
      chartSelectedIds = new Set(orderedList.slice(0,5).map(p=>p.id));
    }
    const colorOf = (pid) => CHART_COLORS[orderedList.findIndex(p=>p.id===pid) % CHART_COLORS.length];

    legendEl.innerHTML = orderedList.map(p => {
      const on = chartSelectedIds.has(p.id);
      const color = colorOf(p.id);
      return `<button class="btn btn-sm" data-chip="${p.id}" style="border:1.5px solid ${on?color:'var(--line)'};background:${on?color+'22':'var(--chalk)'};color:${on?'var(--ink)':'var(--ink-soft)'};">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:5px;"></span>${esc(p.name)}
      </button>`;
    }).join("");
    legendEl.querySelectorAll("[data-chip]").forEach(chip => {
      chip.addEventListener("click", () => {
        const id = chip.dataset.chip;
        if(chartSelectedIds.has(id)) chartSelectedIds.delete(id); else chartSelectedIds.add(id);
        renderProgressChart(orderedList);
      });
    });

    const W = Math.max(420, rounds.length * 60), H = 240, padL = 34, padR = 14, padT = 14, padB = 28;
    const maxY = Math.max(1, ...Array.from(chartSelectedIds).flatMap(id => series[id] || [0]));
    const x = (i) => padL + (i * (W - padL - padR) / Math.max(1, rounds.length-1));
    const y = (v) => H - padB - (v * (H - padT - padB) / maxY);

    const gridLines = [];
    const steps = 4;
    for(let i=0;i<=steps;i++){
      const val = Math.round((maxY/steps)*i);
      const yy = y(val);
      gridLines.push(`<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="var(--line)" stroke-width="1"/>`);
      gridLines.push(`<text x="${padL-8}" y="${yy+4}" font-size="10" text-anchor="end" fill="var(--ink-soft)" font-family="Space Mono, monospace">${val}</text>`);
    }
    const xLabels = rounds.map((rn,i) => `<text x="${x(i)}" y="${H-8}" font-size="10" text-anchor="middle" fill="var(--ink-soft)" font-family="Space Mono, monospace">J${rn}</text>`).join("");

    const lines = Array.from(chartSelectedIds).map(id => {
      const pts = (series[id]||[]).map((v,i) => `${x(i)},${y(v)}`).join(" ");
      const dots = (series[id]||[]).map((v,i) => `<circle cx="${x(i)}" cy="${y(v)}" r="3" fill="${colorOf(id)}"/>`).join("");
      return `<polyline points="${pts}" fill="none" stroke="${colorOf(id)}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${dots}`;
    }).join("");

    svgEl.innerHTML = `
      <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" style="max-width:100%;">
        ${gridLines.join("")}
        ${xLabels}
        ${lines}
      </svg>
    `;
  }

  // ---------- HISTORIAL ----------

      main.innerHTML = `<div class="card empty"><div class="display">Todavía no hay jornadas cerradas</div><p class="muted">Aquí verás el detalle de cada jornada una vez que el admin capture los resultados.</p></div>`;

    list.innerHTML = published.map(r => `
      <div class="history-item">
        <div><strong>Jornada ${r.number}</strong> <span class="muted">· ${r.matches.length} partidos</span></div>
        <button class="btn btn-ghost btn-sm" data-round="${r.id}">Ver detalle</button>
      </div>
    `).join("");
    list.querySelectorAll("button[data-round]").forEach(btn => {

  function renderHistDetail(round){
    const detail = document.getElementById("qz-hist-detail");
    const rows = meta.participants.map(p => {
      const picks = (allPicksCache[p.id] || {})[round.id] || {};
      let correct = 0;
      const cells = round.matches.map(m => {
        const pick = picks[m.id];
        const result = round.results[m.id];
        const label = pick === 'A' ? m.teamA : pick === 'B' ? m.teamB : pick === 'D' ? 'Empate' : '—';
        const isCorrect = pick && result && pick === result;
        if(isCorrect) correct++;
        return `<td style="${isCorrect?'color:#1B4332;font-weight:700;':pick?'color:#7d251d;':'color:var(--ink-soft);'}">${esc(label)}</td>`;
      }).join("");
      return `<tr><td>${esc(p.name)}</td>${cells}<td style="font-weight:700;">${correct}</td></tr>`;
    }).join("");
    const resultRow = round.matches.map(m => {
      const r = round.results[m.id];
      const label = r==='A'? m.teamA : r==='B'? m.teamB : r==='D'?'Empate':'—';
      return `<td style="font-weight:700;">${esc(label)}</td>`;
    }).join("");
    detail.innerHTML = `
      <div class="card" style="overflow-x:auto;">

  // "Participación": who has/hasn't submitted picks for open rounds — status only, never reveals picks
  async function renderAdminParticipacion(body){
    const openRounds = meta.rounds.filter(r => classifyRound(r) === "porjugar").slice().sort((a,b)=>a.number-b.number);
    if(!openRounds.length){
      body.innerHTML = `<div class="card empty"><div class="display">No hay jornadas abiertas</div><p class="muted">No hay ninguna jornada aceptando picks en este momento.</p></div>`;
      return;
    }
    body.innerHTML = `<div class="card"><p class="muted">Cargando estatus de participación…</p></div>`;
    await ensureAllPicksLoaded();

    body.innerHTML = openRounds.map(round => {
      const total = round.matches.length;
      const rows = meta.participants.map(p => {
        const picks = (allPicksCache[p.id] || {})[round.id] || {};
        const count = round.matches.filter(m => picks[m.id]).length;
        let status;
        if(count === 0) status = {label:"Sin contestar", cls:"unpaid", icon:"❌"};
        else if(count < total) status = {label:`Incompleto (${count}/${total})`, cls:"unpaid", icon:"⚠️"};
        else status = {label:"Completo", cls:"paid", icon:"✅"};
        return { name: p.name, ...status, count };
      }).sort((a,b) => a.count - b.count || a.name.localeCompare(b.name));
      const missingNames = rows.filter(r => r.count < total).map(r => r.name);
      return `
        <div class="card">
          <div class="eyebrow" style="display:flex;justify-content:space-between;align-items:center;">
            <span>Jornada ${round.number} · ${total} partidos</span>
            ${missingNames.length ? `<button class="btn btn-ghost btn-sm" data-copy="${round.id}">📋 Copiar recordatorio</button>` : ``}
          </div>
          <p class="muted" style="margin-top:-4px;">No se muestran los picks de nadie, solo si ya contestaron.</p>
          <table>
            <thead><tr><th>Participante</th><th>Estatus</th></tr></thead>
            <tbody>
              ${rows.map(r => `<tr><td>${esc(r.name)}</td><td><span class="badge ${r.cls}">${r.icon} ${r.label}</span></td></tr>`).join("")}
            </tbody>
          </table>
        </div>
      `;
    }).join("");

    body.querySelectorAll("[data-copy]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const round = openRounds.find(r => r.id === btn.dataset.copy);
        const total = round.matches.length;
        const missing = meta.participants.filter(p => {
          const picks = (allPicksCache[p.id] || {})[round.id] || {};
          const count = round.matches.filter(m => picks[m.id]).length;
          return count < total;
        }).map(p => p.name);
        const text = `⏰ Faltan por contestar la Jornada ${round.number}: ${missing.join(", ")}. ¡No se les olvide antes del cierre!`;
        try{
          await navigator.clipboard.writeText(text);
          toast("Recordatorio copiado ✅ pégalo donde quieras");
        }catch(e){
          toast("No se pudo copiar automáticamente, cópialo manualmente: " + text);
        }
      });
    });
  }

    const d = new Date(iso);
    const pad = n => String(n).padStart(2,'0');
    return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()) + "T" + pad(d.getHours()) + ":" + pad(d.getMinutes());
  }

  // ---------- TheSportsDB auto-fill (free API, best-effort suggestions) ----------
  const SPORTSDB_LEAGUE_ID = "4350"; // Mexican Primera League / Liga MX
  const SPORTSDB_TEAM_MAP = {
    "América": "CF America",
    "Atlas": "Atlas",
    "Atlético San Luis": "Atletico de San Luis",
    "Cruz Azul": "Cruz Azul",
    "Chivas": "CD Guadalajara",
    "Juárez": "FC Juarez",
    "León": "León",
    "Mazatlán": "Mazatlán",
    "Monterrey": "Monterrey",
    "Necaxa": "Necaxa",
    "Pachuca": "Pachuca",
    "Puebla": "Puebla",
    "Pumas": "Pumas",
    "Querétaro": "Queretaro FC",
    "Santos": "Santos Laguna",
    "Tigres": "Tigres",
    "Toluca": "Toluca",
    "Xolos": "Tijuana"
  };
  let sportsdbCache = null; // {season, events}

  async function fetchSportsdbSeason(season){
    if(sportsdbCache && sportsdbCache.season === season) return sportsdbCache.events;
    const url = `https://www.thesportsdb.com/api/v1/json/123/eventsseason.php?id=${SPORTSDB_LEAGUE_ID}&s=${encodeURIComponent(season)}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const events = data.events || [];
    sportsdbCache = { season, events };
    return events;
  }

  function findAutoResult(events, m, roundDeadline){
    const mappedA = SPORTSDB_TEAM_MAP[m.teamA];
    const mappedB = SPORTSDB_TEAM_MAP[m.teamB];
    if(!mappedA || !mappedB) return null;
    const targetTime = new Date(roundDeadline).getTime();
    let best = null, bestDiff = Infinity;
    events.forEach(ev => {
      const home = ev.strHomeTeam, away = ev.strAwayTeam;
      const straight = home === mappedA && away === mappedB;
      const swapped = home === mappedB && away === mappedA;
      if(!straight && !swapped) return;
      if(ev.intHomeScore === null || ev.intHomeScore === undefined || ev.intHomeScore === "") return; // not played yet
      const evTime = new Date(ev.dateEvent).getTime();
      const diff = Math.abs(evTime - targetTime);
      if(diff < bestDiff && diff < 1000*60*60*24*20){ // within ~20 days of our deadline
        bestDiff = diff;
        const hs = Number(ev.intHomeScore), as = Number(ev.intAwayScore);
        let result;
        if(straight) result = hs > as ? 'A' : hs < as ? 'B' : 'D';
        else result = hs > as ? 'B' : hs < as ? 'A' : 'D';
        best = { result, date: ev.dateEvent, score: hs + "-" + as };
      }
    });
    return best;
  }

      </div>
    `;
    document.getElementById("qz-autofill").addEventListener("click", async () => {
      const statusEl = document.getElementById("qz-autofill-status");
      statusEl.textContent = "Consultando TheSportsDB…";
      try{
        const season = meta.settings.sportsdbSeason || "2025-2026";
        const events = await fetchSportsdbSeason(season);
        let found = 0;
        round.matches.forEach(m => {
          const hit = findAutoResult(events, m, round.deadline);
          const tag = document.getElementById("qz-suggest-" + m.id);
          if(hit){
            found++;

      });
    }
  }

            createdAt: new Date().toISOString(), exempt: true
          });
          const okIdx = await setPlatformIndex(idx);
          if(!okIdx) throw new Error("no se pudo registrar en la plataforma");

          const okFlag = await kvSet(currentMetaKey(), { migratedTo: slug });
          if(!okFlag) throw new Error("no se pudo cerrar el link viejo");

          statusEl.textContent = "";
          body.innerHTML = `
            <div class="card">
              <div class="eyebrow">✅ Listo</div>
              <p class="muted">Tu quiniela ya vive en su propio link. Comparte este link nuevo con tu grupo — el link principal ya no la mostrará.</p>

            }catch(e){
              toast("Cópialo manualmente del cuadro de texto");
            }
          });
        }catch(e){
          console.error(e);
          statusEl.textContent = "Algo falló durante el movimiento: " + e.message + ". Tus datos originales siguen intactos, puedes reintentar.";
          statusEl.style.color = "var(--red)";
          migrateBtn.disabled = false;
        }
      });
    }
  }

  // ---------- EXCEL EXPORT ----------
  async function exportExcel(){
    toast("Generando Excel…");
    await ensureAllPicksLoaded();
    const wb = XLSX.utils.book_new();

    // Standings
    const standings = standingsList().map((p,i) => ({
      "#": i+1, "Participante": p.name, "Puntos": p.pts, "Pagó": p.paid ? "Sí" : "No"
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(standings), "Tabla");

    // Jornada detail (matrix)
    const detailRows = [];
    meta.rounds.filter(r=>r.resultsPublished).forEach(r => {
      r.matches.forEach(m => {
        const row = { "Jornada": r.number, "Partido": m.teamA + " vs " + m.teamB, "Resultado": r.results[m.id] === 'A' ? m.teamA : r.results[m.id]==='B' ? m.teamB : "Empate" };
        meta.participants.forEach(p => {
          const pick = ((allPicksCache[p.id]||{})[r.id]||{})[m.id];
          row[p.name] = pick === 'A' ? m.teamA : pick === 'B' ? m.teamB : pick === 'D' ? "Empate" : "";
        });
        detailRows.push(row);
      });
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(detailRows), "Jornada detalle");

    // Participant stats
    const statsRows = meta.participants.map(p => {
      let correct=0, total=0, best=0, worst=null;
      meta.rounds.filter(r=>r.resultsPublished).forEach(r => {
        let roundCorrect=0, roundTotal=0;
        r.matches.forEach(m => {
          const result = r.results[m.id];
          const pick = ((allPicksCache[p.id]||{})[r.id]||{})[m.id];
          if(result){ roundTotal++; total++; if(pick===result){ roundCorrect++; correct++; } }
        });
        if(roundTotal>0){
          best = Math.max(best, roundCorrect);
          worst = worst===null ? roundCorrect : Math.min(worst, roundCorrect);
        }
      });
      return {
        "Participante": p.name,
        "Puntos totales": correct,
        "Partidos jugados": total,
        "% Acierto": total ? Math.round((correct/total)*1000)/10 + "%" : "0%",
        "Mejor jornada (aciertos)": best,
        "Peor jornada (aciertos)": worst===null?0:worst
      };
    }).sort((a,b)=>b["Puntos totales"]-a["Puntos totales"]);
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(statsRows), "Estadísticas");

    // Payments
    const paymentRows = meta.participants.map(p => ({
      "Participante": p.name,
      "Cuota": meta.settings.entryFee,
      "Pagó": p.paid ? "Sí" : "No"
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(paymentRows), "Pagos");

    XLSX.writeFile(wb, "quiniela_" + meta.groupName.replace(/\s+/g,"_") + ".xlsx");
    toast("Excel descargado ✅");
  }

  let platformUnlocked = false;

    if(!platformUnlocked){

        const val = document.getElementById("qz-p-pass").value;
        const settings = await getPlatformSettings();
        if(val === settings.dashboardPassword){ platformUnlocked = true; renderPlatformDashboard(); }
        else toast("Contraseña incorrecta");
      });
      return;
    }
    root.innerHTML = `<div class="qz-main" style="padding-top:24px;"><p class="muted">Cargando quinielas…</p></div>`;
    const [idx, settings] = await Promise.all([getPlatformIndex(), getPlatformSettings()]);
    const rows = await Promise.all(idx.quinielas.map(async q => {
      try{
        const r = await kvGet(metaKeyFor(q.slug));
        const count = r.found ? r.value.participants.length : 0;
        return { ...q, exempt: !!q.exempt, count, overThreshold: count >= settings.threshold };
      }catch(e){
        return { ...q, exempt: !!q.exempt, count: null, overThreshold: false };
      }
    }));
    rows.sort((a,b) => (b.count||0) - (a.count||0));

    function statusBadge(q){
      if(q.exempt) return `<span class="badge admin">⭐ Exenta — no se cobra</span>`;
      if(q.overThreshold) return `<span class="badge unpaid">🟡 Cobrar $${settings.pricePerParticipant * q.count} MXN</span>`;
      return `<span class="badge paid">🟢 Debajo del límite</span>`;
    }

    const editingSlug = renderPlatformDashboard._editingSlug || null;

    function rowHtml(q){

        return `
          <tr data-slug="${esc(q.slug)}">
            <td colspan="5">
              <div style="padding:10px 0;">
                <div class="eyebrow">Editando: /q/${esc(q.slug)}</div>

          await setPlatformIndex(idx);
          toast("Quiniela actualizada ✅");
          renderPlatformDashboard._editingSlug = null;
          renderPlatformDashboard();
        }catch(e){
          console.error(e);
          toast("No se pudo guardar: " + e.message);
          saveEditBtn.disabled = false;
        }
      });
    }

    root.querySelectorAll("[data-delete-slug]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const slug = btn.dataset.deleteSlug;
        const q = rows.find(r => r.slug === slug);
        if(!confirm(`¿Eliminar "${q ? q.name : slug}" para siempre? Se borran todas sus jornadas, resultados y picks. Esto NO se puede deshacer.`)) return;
        btn.disabled = true;
        try{
          const r = await kvGet(metaKeyFor(slug));
          if(r.found){
            const participants = r.value.participants || [];
            await Promise.all(participants.map(p => kvDelete("quiniela:" + slug + ":picks:" + p.id)));
          }
          await kvDelete(metaKeyFor(slug));
          idx.quinielas = idx.quinielas.filter(x => x.slug !== slug);
          await setPlatformIndex(idx);
          toast("Quiniela eliminada");
          renderPlatformDashboard();
        }catch(e){
          console.error(e);
          toast("No se pudo eliminar, intenta de nuevo");
          btn.disabled = false;
        }
      });
    });
    root.querySelectorAll("[data-exempt-toggle]").forEach(checkbox => {
      checkbox.addEventListener("change", async () => {
        const tr = checkbox.closest("tr");
        const slug = tr.dataset.slug;
        const entry = idx.quinielas.find(q => q.slug === slug);
        if(!entry) return;
        entry.exempt = checkbox.checked;
        const ok = await setPlatformIndex(idx);
        if(ok){
          const rowData = rows.find(r => r.slug === slug);
          rowData.exempt = checkbox.checked;
          tr.querySelector(".qz-status-cell").innerHTML = statusBadge(rowData);
          toast(checkbox.checked ? "Marcada como exenta ⭐" : "Ya no está exenta");
        } else {
          checkbox.checked = !checkbox.checked;
          toast("No se pudo guardar, intenta de nuevo");
        }
      });
    });
  }

  function renderHome(){
    root.innerHTML = `
      <div class="login-wrap">
        <div class="login-card" style="max-width:440px;text-align:center;">
          <div class="login-title display" style="font-size:36px;">Quinielas</div>
          <p class="login-sub">Crea tu propia quiniela de Liga MX para tu grupo de amigos — jornadas, resultados y tabla de posiciones, todo en un link que solo ustedes usan.</p>
          <a href="/crear" class="btn btn-primary" style="display:block;padding:14px;text-decoration:none;margin-top:8px;">Crear mi quiniela</a>
          <p class="muted" style="margin-top:18px;">¿Ya tienes una? Pídele el link a quien la creó.</p>
        </div>
      </div>
    `;
  }

  function renderMigratedNotice(slug){
    root.innerHTML = `
      <div class="login-wrap">
        <div class="login-card" style="text-align:center;">
          <div class="login-title display" style="font-size:28px;">Esta quiniela se movió</div>
          <p class="login-sub">Tiene un nuevo link permanente:</p>
          <a href="/q/${encodeURIComponent(slug)}" class="btn btn-primary" style="display:block;padding:14px;text-decoration:none;margin-bottom:8px;">Ir a la quiniela</a>
          <p class="muted">Actualiza tus favoritos/enlaces compartidos a: <strong>${esc(window.location.origin)}/q/${esc(slug)}</strong></p>
        </div>
      </div>
    `;
  }

  async function boot(attempt){
    attempt = attempt || 1;

    if(ROUTE === "crear"){ renderCrear(); return; }
    if(ROUTE === "unknown"){ renderUnknownRoute(); return; }
    if(ROUTE === "platform"){ renderPlatformDashboard(); return; }

    root.innerHTML = `<div class="login-wrap"><div class="login-card"><p class="muted" style="text-align:center;">Cargando…</p></div></div>`;
    let m;
    try{
      m = await getMeta();
    }catch(e){
      console.error("boot: failed to load data", e);
      // Never initialize fresh data on a failed request — only retry.
      if(attempt < 3){
        setTimeout(() => boot(attempt + 1), 1200);
        return;
      }
      renderBootError("No pudimos cargar los datos de la quiniela. Puede ser que el servidor apenas esté despertando (tarda ~30-60 segundos la primera vez) o un problema de conexión.", () => boot(1));
      return;
    }
    if(m === null){
      if(ROUTE === "quiniela"){
        // A /q/:slug that doesn't exist — never silently create data under someone else's link.
        renderQuinielaNotFound();
        return;
      }
      // ROUTE === "root": nothing here anymore (or never was) — show the public home page.
      renderHome();
      return;
    }
    if(ROUTE === "root" && m.migratedTo){
      renderMigratedNotice(m.migratedTo);
      return;
    }
    meta = m;
    render();
  }
  boot();
})();
</script>
</body>
</html>
